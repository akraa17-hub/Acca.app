<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>برنامج محاسبي - أكرم فاضل</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap');
        
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #f8fafc;
        }

        @media print {
            .no-print { display: none !important; }
            aside { display: none !important; }
            main { margin: 0 !important; padding: 0 !important; overflow: visible !important; }
            .printable-content { width: 100% !important; }
            header { display: none !important; }
            body { background: white !important; }
            .break-inside-avoid { break-inside: avoid; }
        }
        
        /* تحسينات للطباعة */
        @page { margin: 2cm; }
    </style>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, collection, addDoc, setDoc, updateDoc, deleteDoc, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDUcQyht2D6vpuUZyCQTxEqtLZf4Feo5aM",
    authDomain: "acca-app-80ca8.firebaseapp.com",
    projectId: "acca-app-80ca8",
    storageBucket: "acca-app-80ca8.firebasestorage.app",
    messagingSenderId: "196121768353",
    appId: "1:196121768353:web:e0623f775bb3f0409e1be0"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // جعل أدوات فايربيس متاحة لتطبيق React
  window.db = db;
  window.fs = { collection, addDoc, setDoc, updateDoc, deleteDoc, doc, onSnapshot };
</script>
  
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // --- مكون للأيقونات ---
        const LucideIcon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} width={size} height={size} className={className}></i>;
        };

        // تعريف الأيقونات المستخدمة
        const Home = (props) => <LucideIcon name="home" {...props} />;
        const Book = (props) => <LucideIcon name="book" {...props} />;
        const PieChart = (props) => <LucideIcon name="pie-chart" {...props} />;
        const Plus = (props) => <LucideIcon name="plus" {...props} />;
        const Trash2 = (props) => <LucideIcon name="trash-2" {...props} />;
        const Save = (props) => <LucideIcon name="save" {...props} />;
        const ArrowLeft = (props) => <LucideIcon name="arrow-left" {...props} />;
        const Filter = (props) => <LucideIcon name="filter" {...props} />;
        const Calculator = (props) => <LucideIcon name="calculator" {...props} />;
        const Edit = (props) => <LucideIcon name="edit" {...props} />;
        const Menu = (props) => <LucideIcon name="menu" {...props} />;
        const Printer = (props) => <LucideIcon name="printer" {...props} />;
        const Download = (props) => <LucideIcon name="download" {...props} />;
        const FileSpreadsheet = (props) => <LucideIcon name="file-spreadsheet" {...props} />;
        const Search = (props) => <LucideIcon name="search" {...props} />;

        // --- بداية التطبيق ---
        function App() {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [isSidebarOpen, setIsSidebarOpen] = useState(true);
            const [isLoaded, setIsLoaded] = useState(false); // للتأكد من تحميل البيانات السحابية

            // --- 1. هيكل البيانات (Data Structure) من السحابة ---
            const [accounts, setAccounts] = useState([]);
            const [journalEntries, setJournalEntries] = useState([]);

            // الربط المباشر مع سحابة فايربيس
            useEffect(() => {
                const initFirebase = () => {
                    if (!window.db || !window.fs) {
                        setTimeout(initFirebase, 100);
                        return;
                    }

                    // الاستماع اللحظي للحسابات
                    const unsubAccounts = window.fs.onSnapshot(window.fs.collection(window.db, "accounts"), (snapshot) => {
                        if (snapshot.empty) {
                            // رفع الحسابات الافتراضية إذا كانت السحابة فارغة
                            const initialAccounts = [
                                { id: '1', code: '1', name: 'الأصول', type: 'asset', level: 1, parentId: null },
                                { id: '11', code: '11', name: 'الأصول المتداولة', type: 'asset', level: 2, parentId: '1' },
                                { id: '1101', code: '1101', name: 'النقدية في الصندوق', type: 'asset', level: 3, parentId: '11' },
                                { id: '1102', code: '1102', name: 'البنك - الأهلي', type: 'asset', level: 3, parentId: '11' },
                                { id: '1103', code: '1103', name: 'العملاء', type: 'asset', level: 3, parentId: '11' },
                                { id: '2', code: '2', name: 'الخصوم', type: 'liability', level: 1, parentId: null },
                                { id: '21', code: '21', name: 'الخصوم المتداولة', type: 'liability', level: 2, parentId: '2' },
                                { id: '2101', code: '2101', name: 'الموردين', type: 'liability', level: 3, parentId: '21' },
                                { id: '3', code: '3', name: 'حقوق الملكية', type: 'equity', level: 1, parentId: null },
                                { id: '3101', code: '3101', name: 'رأس المال', type: 'equity', level: 3, parentId: '3' },
                                { id: '4', code: '4', name: 'الإيرادات', type: 'revenue', level: 1, parentId: null },
                                { id: '4101', code: '4101', name: 'إيرادات المبيعات', type: 'revenue', level: 3, parentId: '4' },
                                { id: '5', code: '5', name: 'المصروفات', type: 'expense', level: 1, parentId: null },
                                { id: '5101', code: '5101', name: 'مصروفات الإيجار', type: 'expense', level: 3, parentId: '5' },
                                { id: '5102', code: '5102', name: 'مصروفات الكهرباء', type: 'expense', level: 3, parentId: '5' },
                            ];
                            initialAccounts.forEach(acc => {
                                const accData = { ...acc };
                                delete accData.id;
                                window.fs.setDoc(window.fs.doc(window.db, "accounts", acc.id), accData);
                            });
                        } else {
                            const accs = snapshot.docs.map(doc => ({ ...doc.data(), id: doc.id }));
                            setAccounts(accs);
                        }
                    });

                    // الاستماع اللحظي لقيود اليومية
                    const unsubJournals = window.fs.onSnapshot(window.fs.collection(window.db, "journalEntries"), (snapshot) => {
                        const entries = snapshot.docs.map(doc => ({ ...doc.data(), id: doc.id }));
                        // ترتيب القيود من الأقدم للأحدث بناءً على معرف القيد (تاريخ الإنشاء)
                        setJournalEntries(entries.sort((a,b) => a.id - b.id));
                        setIsLoaded(true);
                    });

                    return () => {
                        unsubAccounts();
                        unsubJournals();
                    };
                };

                initFirebase();
            }, []);

            // --- 2. المنطق المساعد (Helper Logic) ---

            const getAccountBalance = (accountId) => {
                let balance = 0;
                const account = accounts.find(a => a.id === accountId);
                if (!account) return 0;

                journalEntries.forEach(entry => {
                entry.lines.forEach(line => {
                    if (line.accountId === accountId) {
                    if (['asset', 'expense'].includes(account.type)) {
                        balance += (Number(line.debit) - Number(line.credit));
                    } else {
                        balance += (Number(line.credit) - Number(line.debit));
                    }
                    }
                });
                });
                return balance;
            };

            const getAccountTotals = (accountId) => {
                let totalDebit = 0;
                let totalCredit = 0;
                journalEntries.forEach(entry => {
                entry.lines.forEach(line => {
                    if (line.accountId === accountId) {
                    totalDebit += Number(line.debit);
                    totalCredit += Number(line.credit);
                    }
                });
                });
                return { totalDebit, totalCredit };
            };

            const generateNextCode = (parentAccount) => {
                if (!parentAccount) {
                const rootAccounts = accounts.filter(a => !a.parentId);
                if (rootAccounts.length === 0) return '1';
                const maxCode = Math.max(...rootAccounts.map(a => parseInt(a.code)));
                return (maxCode + 1).toString();
                }
                const siblings = accounts.filter(a => a.parentId === parentAccount.id);
                if (siblings.length > 0) {
                const maxCode = Math.max(...siblings.map(a => parseInt(a.code)));
                return (maxCode + 1).toString();
                } else {
                if (parentAccount.code.length === 1) return `${parentAccount.code}1`;
                return `${parentAccount.code}01`;
                }
            };

            const exportToCSV = (filename, rows) => {
                const csvContent = "\uFEFF" + rows.map(e => e.join(",")).join("\n");
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                const url = URL.createObjectURL(blob);
                link.setAttribute("href", url);
                link.setAttribute("download", `${filename}.csv`);
                link.style.visibility = 'hidden';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            const handlePrint = () => {
                window.print();
            };

            // --- 3. المكونات الفرعية (Sub-Components) ---

            const ChartOfAccountsView = () => {
                const [formData, setFormData] = useState({ id: '', code: '', name: '', type: 'asset', parentId: '' });
                const [isEditing, setIsEditing] = useState(false);
                
                useEffect(() => {
                    if (!isEditing && !formData.code && accounts.length > 0) {
                        const nextCode = generateNextCode(null);
                        setFormData(prev => ({ ...prev, code: nextCode }));
                    }
                }, [accounts, isEditing]);

                const potentialParents = accounts.filter(a => a.level < 3);

                const handleParentChange = (e) => {
                    const pid = e.target.value;
                    const parentAcc = accounts.find(a => a.id === pid);
                    const nextCode = generateNextCode(parentAcc || null);
                    
                    setFormData({
                        ...formData,
                        parentId: pid,
                        code: nextCode,
                        type: parentAcc ? parentAcc.type : 'asset'
                    });
                };

                // حفظ الحساب في السحابة
                const handleSubmit = async () => {
                if (!formData.code || !formData.name) return;
                let level = 1;
                if (formData.parentId) {
                    const parent = accounts.find(a => a.id === formData.parentId);
                    if (parent) level = parent.level + 1;
                }
                
                const accountData = { 
                    code: formData.code, 
                    name: formData.name, 
                    type: formData.type, 
                    parentId: formData.parentId || null, 
                    level 
                };

                try {
                    // استخدام setDoc ليكون كود الحساب هو نفسه معرف المستند في السحابة
                    await window.fs.setDoc(window.fs.doc(window.db, "accounts", formData.code), accountData);
                    
                    setIsEditing(false);
                    const nextRootCode = generateNextCode(null);
                    setFormData({ id: '', code: nextRootCode, name: '', type: 'asset', parentId: '' });
                } catch(e) {
                    console.error("خطأ في الحفظ السحابي", e);
                    alert("حدث خطأ أثناء حفظ الحساب");
                }
                };

                const handleEditClick = (account) => {
                setFormData(account);
                setIsEditing(true);
                window.scrollTo({ top: 0, behavior: 'smooth' });
                };

                const handleAddSubAccount = (parentAccount) => {
                const nextCode = generateNextCode(parentAccount);
                setFormData({ 
                    id: '', 
                    code: nextCode, 
                    name: '', 
                    type: parentAccount.type, 
                    parentId: parentAccount.id 
                });
                setIsEditing(false);
                window.scrollTo({ top: 0, behavior: 'smooth' });
                };

                // حذف الحساب من السحابة
                const handleDeleteClick = async (id) => {
                if (window.confirm('هل أنت متأكد من حذف هذا الحساب؟')) {
                    const isUsed = journalEntries.some(entry => entry.lines.some(line => line.accountId === id));
                    if (isUsed) {
                    alert('لا يمكن حذف حساب تم استخدامه في قيود يومية.');
                    return;
                    }
                    const hasChildren = accounts.some(a => a.parentId === id);
                    if (hasChildren) {
                    alert('لا يمكن حذف حساب رئيسي يحتوي على حسابات فرعية.');
                    return;
                    }
                    try {
                        await window.fs.deleteDoc(window.fs.doc(window.db, "accounts", id));
                    } catch(e) {
                        console.error("خطأ في الحذف السحابي", e);
                    }
                }
                };

                const handleCancel = () => {
                setIsEditing(false);
                const nextRootCode = generateNextCode(null);
                setFormData({ id: '', code: nextRootCode, name: '', type: 'asset', parentId: '' });
                };

                return (
                <div className="space-y-6 animate-fade-in printable-content">
                    <div className="flex justify-between items-center no-print">
                    <h2 className="text-2xl font-bold text-slate-800">دليل الحسابات (شجرة الحسابات)</h2>
                    </div>

                    <div className="bg-slate-50 p-4 rounded-xl border border-slate-200 no-print">
                    <h3 className="text-sm font-bold text-slate-700 mb-3">
                        {isEditing ? 'تعديل بيانات الحساب' : 'إضافة حساب جديد'}
                    </h3>
                    <div className="flex flex-wrap gap-2 items-end">
                        <div className="w-32">
                        <label className="text-xs text-slate-500 block mb-1">الكود (تلقائي)</label>
                        <input 
                            className="border p-2 rounded text-sm w-full bg-slate-100 text-slate-500 cursor-not-allowed"
                            value={formData.code}
                            readOnly
                        />
                        </div>
                        <div className="w-48">
                        <label className="text-xs text-slate-500 block mb-1">الحساب الرئيسي (الأب)</label>
                        <select 
                            className="border p-2 rounded text-sm w-full"
                            value={formData.parentId || ''}
                            onChange={handleParentChange}
                            disabled={isEditing}
                        >
                            <option value="">-- حساب رئيسي (مستوى 1) --</option>
                            {potentialParents.map(p => (
                            <option key={p.id} value={p.id}>{p.code} - {p.name}</option>
                            ))}
                        </select>
                        </div>
                        <div className="flex-1 min-w-[200px]">
                        <label className="text-xs text-slate-500 block mb-1">اسم الحساب</label>
                        <input 
                            className="border p-2 rounded text-sm w-full"
                            value={formData.name}
                            onChange={e => setFormData({...formData, name: e.target.value})}
                            placeholder="أدخل اسم الحساب"
                        />
                        </div>
                        <div className="w-32">
                        <label className="text-xs text-slate-500 block mb-1">النوع</label>
                        <select 
                            className="border p-2 rounded text-sm w-full"
                            value={formData.type}
                            onChange={e => setFormData({...formData, type: e.target.value})}
                            disabled={!!formData.parentId}
                        >
                            <option value="asset">أصول</option>
                            <option value="liability">خصوم</option>
                            <option value="equity">حقوق ملكية</option>
                            <option value="revenue">إيرادات</option>
                            <option value="expense">مصروفات</option>
                        </select>
                        </div>
                        
                        <div className="flex gap-2">
                            <button 
                            onClick={handleSubmit} 
                            className={`px-4 py-2 rounded text-white text-sm flex items-center gap-1 ${isEditing ? 'bg-emerald-600 hover:bg-emerald-700' : 'bg-blue-600 hover:bg-blue-700'}`}
                            >
                            {isEditing ? <Save size={16}/> : <Plus size={16}/>}
                            {isEditing ? 'حفظ' : 'إضافة'}
                            </button>
                            {(isEditing || formData.parentId) && (
                            <button onClick={handleCancel} className="px-3 py-2 rounded bg-slate-200 hover:bg-slate-300 text-slate-600 text-sm">
                                إلغاء
                            </button>
                            )}
                        </div>
                    </div>
                    </div>

                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                    <table className="w-full text-right">
                        <thead className="bg-slate-50 text-slate-600 text-sm">
                        <tr>
                            <th className="px-6 py-3">الكود</th>
                            <th className="px-6 py-3">اسم الحساب</th>
                            <th className="px-6 py-3">النوع</th>
                            <th className="px-6 py-3">المستوى</th>
                            <th className="px-6 py-3">الرصيد الحالي</th>
                            <th className="px-6 py-3 text-center no-print">إجراءات</th>
                        </tr>
                        </thead>
                        <tbody className="divide-y divide-slate-100">
                        {[...accounts].sort((a,b) => a.code.localeCompare(b.code)).map((acc) => (
                            <tr key={acc.id} className="hover:bg-slate-50">
                            <td className="px-6 py-3 font-mono text-slate-500">{acc.code}</td>
                            <td className="px-6 py-3 font-medium text-slate-800">
                                <div style={{ paddingRight: `${(acc.level - 1) * 24}px` }} className="flex items-center gap-2">
                                {acc.level > 1 && <span className="text-slate-300">↳</span>}
                                {acc.name}
                                </div>
                            </td>
                            <td className="px-6 py-3 text-sm">
                                <span className={`px-2 py-1 rounded-full text-xs ${
                                acc.type === 'asset' ? 'bg-emerald-100 text-emerald-700' :
                                acc.type === 'liability' ? 'bg-red-100 text-red-700' :
                                acc.type === 'equity' ? 'bg-purple-100 text-purple-700' :
                                'bg-blue-100 text-blue-700'
                                }`}>
                                {acc.type === 'asset' ? 'أصول' : 
                                acc.type === 'liability' ? 'خصوم' : 
                                acc.type === 'equity' ? 'ملكية' : 
                                acc.type === 'revenue' ? 'إيراد' : 'مصروف'}
                                </span>
                            </td>
                            <td className="px-6 py-3 text-slate-500">{acc.level}</td>
                            <td className="px-6 py-3 font-bold">{getAccountBalance(acc.id).toLocaleString()}</td>
                            <td className="px-6 py-3 flex justify-center gap-2 no-print">
                                {acc.level < 3 && (
                                <button 
                                    onClick={() => handleAddSubAccount(acc)}
                                    className="p-1.5 bg-emerald-50 text-emerald-600 hover:bg-emerald-100 rounded border border-emerald-200 transition-colors" 
                                    title="إضافة حساب فرعي"
                                >
                                    <Plus size={16} />
                                </button>
                                )}
                                <button 
                                onClick={() => handleEditClick(acc)}
                                className="p-1.5 bg-blue-50 text-blue-600 hover:bg-blue-100 rounded border border-blue-200 transition-colors" 
                                title="تعديل"
                                >
                                <Edit size={16} />
                                </button>
                                <button 
                                onClick={() => handleDeleteClick(acc.id)}
                                className="p-1.5 bg-red-50 text-red-600 hover:bg-red-100 rounded border border-red-200 transition-colors" 
                                title="حذف"
                                >
                                <Trash2 size={16} />
                                </button>
                            </td>
                            </tr>
                        ))}
                        </tbody>
                    </table>
                    </div>
                </div>
                );
            };

            const JournalEntriesView = () => {
                const [viewMode, setViewMode] = useState('list');
                const [editingId, setEditingId] = useState(null);
                const [newEntry, setNewEntry] = useState({
                date: new Date().toISOString().split('T')[0],
                description: '',
                lines: [
                    { accountId: '', debit: 0, credit: 0, note: '' },
                    { accountId: '', debit: 0, credit: 0, note: '' }
                ]
                });

                const totalDebit = newEntry.lines.reduce((sum, line) => sum + Number(line.debit), 0);
                const totalCredit = newEntry.lines.reduce((sum, line) => sum + Number(line.credit), 0);
                const isBalanced = totalDebit === totalCredit && totalDebit > 0;

                const handleAddLine = () => {
                setNewEntry({...newEntry, lines: [...newEntry.lines, { accountId: '', debit: 0, credit: 0, note: '' }]});
                };

                const handleLineChange = (index, field, value) => {
                const updatedLines = [...newEntry.lines];
                updatedLines[index][field] = value;
                if (field === 'debit' && value > 0) updatedLines[index].credit = 0;
                if (field === 'credit' && value > 0) updatedLines[index].debit = 0;
                setNewEntry({...newEntry, lines: updatedLines});
                };

                const handleRemoveLine = (index) => {
                    if(newEntry.lines.length > 2) {
                        setNewEntry({...newEntry, lines: newEntry.lines.filter((_, i) => i !== index)});
                    }
                };

                const handleEditEntry = (entry) => {
                setNewEntry(entry);
                setEditingId(entry.id);
                setViewMode('create');
                };

                // حفظ القيد في السحابة
                const saveEntry = async () => {
                if (!isBalanced || !newEntry.description) return;
                
                const entryData = {
                    date: newEntry.date,
                    description: newEntry.description,
                    lines: newEntry.lines
                };
                
                try {
                    if (editingId) {
                        await window.fs.updateDoc(window.fs.doc(window.db, "journalEntries", editingId), entryData);
                    } else {
                        // استخدام تاريخ الوقت بالملي ثانية كمعرف مستند لترتيبها لاحقا
                        const timeId = Date.now().toString();
                        await window.fs.setDoc(window.fs.doc(window.db, "journalEntries", timeId), entryData);
                    }

                    setViewMode('list');
                    setEditingId(null);
                    setNewEntry({
                        date: new Date().toISOString().split('T')[0],
                        description: '',
                        lines: [{ accountId: '', debit: 0, credit: 0, note: '' }, { accountId: '', debit: 0, credit: 0, note: '' }]
                    });
                } catch(e) {
                    console.error("خطأ في حفظ القيد", e);
                    alert("حدث خطأ أثناء حفظ القيد");
                }
                };

                const handleExportJournalExcel = () => {
                const rows = [
                    ["رقم القيد", "التاريخ", "البيان", "اسم الحساب", "ملاحظات", "مدين", "دائن"]
                ];
                
                journalEntries.forEach(entry => {
                    entry.lines.forEach(line => {
                    const accName = accounts.find(a => a.id === line.accountId)?.name || line.accountId;
                    rows.push([
                        entry.id,
                        entry.date,
                        entry.description,
                        accName,
                        line.note,
                        line.debit,
                        line.credit
                    ]);
                    });
                });
                
                exportToCSV("journal_entries", rows);
                };

                if (viewMode === 'create') {
                return (
                    <div className="space-y-6">
                    <div className="flex items-center gap-4">

                // دالة لحساب حركات حساب واحد
                const getAccountEntries = (accountId) => {
                const entries = [];
                let runningBalance = 0;
                const acc = accounts.find(a => a.id === accountId);
                if(!acc) return [];
                const isDebitNature = ['asset', 'expense'].includes(acc.type);

                journalEntries.forEach(entry => {
                    entry.lines.forEach(line => {
                    if (line.accountId === accountId) {
                        if(isDebitNature) {
                            runningBalance += (Number(line.debit) - Number(line.credit));
                        } else {
                            runningBalance += (Number(line.credit) - Number(line.debit));
                        }
                        entries.push({
                        date: entry.date,
                        desc: entry.description,
                        note: line.note,
                        debit: line.debit,
                        credit: line.credit,
                        balance: runningBalance
                        });
                    }
                    });
                });
                return entries;
                };

                    return accounts
                        .filter(a => a.level === 3)

                    const debitBalance = isDebit ? balance : 0;
                    const creditBalance = !isDebit ? balance : 0;

                    ...acc, 
                    balance, 
                    debitBalance, 
                    creditBalance

                        rows.push(["المصروفات", "", ""]);
                        accounts.filter(a => a.type === 'expense' && a.level === 3).forEach(acc => {
                            const bal = getAccountBalance(acc.id);
                            if(bal > 0) rows.push([acc.name, bal, ""]);

                        rows.push(["صافي الربح/الخسارة", "", netIncome]);

                        rows.push(["الميزانية العمومية", ""]);
                        rows.push(["الأصول", assets]);
                        rows.push(["الخصوم", liabilities]);
                        rows.push(["حقوق الملكية", equity]);

                        <p className="text-sm text-slate-400 mt-1">كما في {new Date().toLocaleDateString('ar-SA')}</p>

                    {reportType === 'trial' && (
                        <div className="overflow-hidden">
                        <table className="w-full text-right border-collapse">
                            <thead className="bg-slate-50 text-slate-700 text-sm border-b border-t border-slate-200">
                            <tr>
                                <th className="px-4 py-2 border-l">كود الحساب</th>
                                <th className="px-4 py-2 border-l">اسم الحساب</th>
                                <th className="px-4 py-2 border-l text-center">أرصدة مدينة</th>
                                <th className="px-4 py-2 text-center">أرصدة دائنة</th>
                            </tr>
                            </thead>
                            <tbody className="text-sm text-slate-600 divide-y divide-slate-100">
                            {trialBalanceData.map(acc => (

                                const bal = getAccountBalance(acc.id);
                                if (bal === 0) return null;
                                return (
                                <tr key={acc.id}>
                                    <td className="px-8 py-2 border-l">{acc.name}</td>
                                    <td className="px-4 py-2 border-l text-center">{bal.toLocaleString()}</td>
                                    <td className="px-4 py-2 text-center"></td>
                                </tr>
                                );
                            })}
                            <tr className="font-bold bg-emerald-50 text-emerald-800 border-t border-b">
                                <td className="px-4 py-2 border-l">إجمالي الإيرادات</td>
                                <td className="px-4 py-2 border-l text-center"></td>
                                <td className="px-4 py-2 text-center">{revenues.toLocaleString()}</td>

                            {/* المصروفات */}

                                const bal = getAccountBalance(acc.id);

                                <td className="px-4 py-3 text-center">{netIncome.toLocaleString()}</td>

                            </tbody>
                        </table>

                    {reportType === 'balance' && (

                                <span>{acc.name}</span>
                                <span>{getAccountBalance(acc.id).toLocaleString()}</span>
                            </div>
                            ))}
                            <div className="flex justify-between font-bold text-slate-800 mt-2 pt-2 border-t">
                            <span>إجمالي الأصول</span>
                            <span>{assets.toLocaleString()}</span>
                            </div>
                        </div>

                        <div>
                            <h3 className="font-bold text-red-700 border-b border-red-100 pb-2 mb-2">الخصوم</h3>
                            {accounts.filter(a => a.type === 'liability' && getAccountBalance(a.id) !== 0).map(acc => (
                            <div key={acc.id} className="flex justify-between text-sm text-slate-600 mb-1">
                                <span>{acc.name}</span>
                                <span>{getAccountBalance(acc.id).toLocaleString()}</span>
                            </div>
                            ))}
                            <div className="flex justify-between font-bold text-slate-800 mt-2 pt-2 border-t">
                            <span>إجمالي الخصوم</span>
                            <span>{liabilities.toLocaleString()}</span>
                            </div>
                        </div>

                        <div>
                            <h3 className="font-bold text-blue-700 border-b border-blue-100 pb-2 mb-2">حقوق الملكية</h3>
                            {accounts.filter(a => a.type === 'equity' && getAccountBalance(a.id) !== 0).map(acc => (
                            <div key={acc.id} className="flex justify-between text-sm text-slate-600 mb-1">
                                <span>{acc.name}</span>
                                <span>{getAccountBalance(acc.id).toLocaleString()}</span>
                            </div>
                            ))}
                            <div className="flex justify-between text-sm text-slate-600 mb-1">
                                <span>أرباح العام (مرحلة من قائمة الدخل)</span>
                                <span>{netIncome.toLocaleString()}</span>
                            </div>
                            <div className="flex justify-between font-bold text-slate-800 mt-2 pt-2 border-t">
                            <span>إجمالي حقوق الملكية</span>
                            <span>{equity.toLocaleString()}</span>
                            </div>
                        </div>

                        <div className="flex justify-between font-bold text-white bg-slate-800 p-4 rounded mt-4">
                            <span>إجمالي الخصوم وحقوق الملكية</span>
                            <span>{(liabilities + equity).toLocaleString()}</span>
                        </div>
                        </div>
                    )}
                    </div>
                </div>
                );
            };

            const DashboardView = () => (
                <div className="space-y-6 animate-fade-in printable-content">
                <h2 className="text-2xl font-bold text-slate-800 mb-6 no-print">لوحة التحكم المالية</h2>
                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                    <p className="text-slate-500 text-sm mb-1">إجمالي الأصول</p>
                    <h3 className="text-3xl font-bold text-slate-800">
                        {accounts.filter(a=>a.type==='asset').reduce((sum,acc)=>sum+getAccountBalance(acc.id),0).toLocaleString()}
                    </h3>
                    <div className="mt-4 h-1 bg-emerald-100 rounded overflow-hidden">
                        <div className="h-full bg-emerald-500 w-full"></div>
                    </div>
                    </div>
                    <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                    <p className="text-slate-500 text-sm mb-1">إجمالي الالتزامات</p>
                    <h3 className="text-3xl font-bold text-slate-800">
                        {accounts.filter(a=>a.type==='liability').reduce((sum,acc)=>sum+getAccountBalance(acc.id),0).toLocaleString()}
                    </h3>
                    <div className="mt-4 h-1 bg-red-100 rounded overflow-hidden">
                        <div className="h-full bg-red-500 w-2/3"></div>
                    </div>
                    </div>
                    <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                    <p className="text-slate-500 text-sm mb-1">صافي الدخل (تقريبي)</p>
                    <h3 className="text-3xl font-bold text-blue-600">
                        {(accounts.filter(a=>a.type==='revenue').reduce((sum,acc)=>sum+getAccountBalance(acc.id),0) - 
                        accounts.filter(a=>a.type==='expense').reduce((sum,acc)=>sum+getAccountBalance(acc.id),0)).toLocaleString()}
                    </h3>
                    <div className="mt-4 h-1 bg-blue-100 rounded overflow-hidden">
                        <div className="h-full bg-blue-500 w-1/2"></div>
                    </div>
                    </div>
                </div>
                
                <div className="bg-blue-50 p-4 rounded-lg border border-blue-200 text-blue-800 text-sm no-print">
                    <strong>تلميح:</strong> لضمان توازن الميزانية، تأكد دائمًا من أن إجمالي المدين يساوي إجمالي الدائن في قيود اليومية.
                </div>
                </div>
            );

            const SidebarItem = ({ id, label, icon: Icon }) => (
                <button
                onClick={() => setActiveTab(id)}
                className={`w-full flex items-center gap-3 px-4 py-3 transition-colors duration-200 ${
                    activeTab === id 
                    ? 'bg-blue-600 text-white shadow-md' 
                    : 'text-slate-300 hover:bg-slate-800 hover:text-white'
                }`}
                >
                <Icon size={20} />
                <span className={`font-medium ${!isSidebarOpen && 'hidden'}`}>{label}</span>
                </button>
            );

            // صفحة انتظار لحين تحميل البيانات من السحابة
            if (!isLoaded) {
                return (
                    <div className="flex h-screen items-center justify-center bg-slate-50 font-sans" dir="rtl">
                        <div className="text-center">
                            <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto mb-4"></div>
                            <h2 className="text-xl font-bold text-slate-700">جاري الاتصال بالسحابة...</h2>
                            <p className="text-slate-500 text-sm mt-2">يرجى الانتظار لحظات</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex h-screen bg-slate-50 font-sans" dir="rtl">
                <aside className={`bg-slate-900 text-white flex flex-col transition-all duration-300 ${isSidebarOpen ? 'w-64' : 'w-20'}`}>
                    <div className="p-6 border-b border-slate-800 flex items-center justify-between">
                    <div className={`${!isSidebarOpen && 'hidden'}`}>
                        <div className="font-bold text-lg bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400 leading-tight">
                        نظام محاسبي سحابي
                        </div>
                        <div className="text-xs text-slate-400 mt-1 font-medium">أكرم فاضل</div>
                    </div>
                    <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="text-slate-400 hover:text-white">
                        <Menu size={20} />
                    </button>
                    </div>
                    <nav className="flex-1 py-6 space-y-1">
                    <SidebarItem id="dashboard" label="الرئيسية" icon={Home} />
                    <SidebarItem id="coa" label="دليل الحسابات" icon={Filter} />
                    <SidebarItem id="journal" label="قيود اليومية" icon={Plus} />
                    <SidebarItem id="ledger" label="دفتر الأستاذ" icon={Book} />
                    <SidebarItem id="reports" label="القوائم المالية" icon={PieChart} />
                    </nav>
                </aside>

                <main className="flex-1 overflow-auto flex flex-col">
                    <header className="bg-white border-b border-slate-200 p-4 px-8 shadow-sm sticky top-0 z-10 flex justify-between">
                    <h1 className="text-xl font-bold text-slate-700">
                        {activeTab === 'dashboard' && 'الرئيسية'}
                        {activeTab === 'coa' && 'دليل الحسابات'}
                        {activeTab === 'journal' && 'قيود اليومية'}
                        {activeTab === 'ledger' && 'دفتر الأستاذ'}
                        {activeTab === 'reports' && 'التقارير المالية'}
                    </h1>
                    <div className="flex items-center gap-2 text-slate-500 text-sm">
                        <span className="flex items-center gap-1 text-emerald-600 bg-emerald-50 px-2 py-1 rounded">
                            <span className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                            متصل بالسحابة
                        </span>
                    </div>
                    </header>

                    <div className="p-8">
                    {activeTab === 'dashboard' && <DashboardView />}
                    {activeTab === 'coa' && <ChartOfAccountsView />}
                    {activeTab === 'journal' && <JournalEntriesView />}
                    {activeTab === 'ledger' && <GeneralLedgerView />}
                    {activeTab === 'reports' && <FinancialStatementsView />}
                    </div>
                </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
