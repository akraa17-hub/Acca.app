<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام المحاسبة - زياد العتيبي</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body>
    <div id="root">
        <div style="display: flex; height: 100vh; align-items: center; justify-content: center; font-family: sans-serif; direction: rtl;">
            <div style="text-align: center;">
                <div style="border: 4px solid #f3f3f3; border-top: 4px solid #2563eb; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 15px;"></div>
                <h2 style="color: #334155;">جاري تشغيل النظام...</h2>
            </div>
        </div>
    </div>

    <style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDUcQyht2D6vpuUZyCQTxEqtLZf4Feo5aM",
            authDomain: "acca-app-80ca8.firebaseapp.com",
            projectId: "acca-app-80ca8",
            storageBucket: "acca-app-80ca8.firebasestorage.app",
            messagingSenderId: "196121768353",
            appId: "1:196121768353:web:e0623f775bb3f0409e1be0"
        };

        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
        window.auth = getAuth(app);
        window.fs = { collection, onSnapshot };
        window.authActions = { signInWithEmailAndPassword, signOut, onAuthStateChanged };
        
        // إبلاغ الصفحة أن فايربيس جاهز
        window.isFirebaseLoaded = true;
        window.dispatchEvent(new Event('firebase-ready'));
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [status, setStatus] = useState('loading'); // loading, login, dashboard
            const [user, setUser] = useState(null);

            useEffect(() => {
                const init = () => {
                    if (!window.authActions) return;
                    window.authActions.onAuthStateChanged(window.auth, (currentUser) => {
                        if (currentUser) {
                            setUser(currentUser);
                            setStatus('dashboard');
                        } else {
                            setStatus('login');
                        }
                    });
                };

                if (window.isFirebaseLoaded) init();
                else window.addEventListener('firebase-ready', init);
            }, []);

            if (status === 'loading') return (
                <div className="flex h-screen items-center justify-center bg-slate-50">
                    <div className="text-center">
                        <div className="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600 mx-auto mb-4"></div>
                        <h2 className="text-xl font-bold text-slate-700">جاري الاتصال بقاعدة البيانات...</h2>
                    </div>
                </div>
            );

            if (status === 'login') return (
                <div className="flex h-screen items-center justify-center bg-slate-100 p-4">
                    <div className="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full border border-slate-200 text-center">
                        <h1 className="text-2xl font-bold mb-2">تسجيل الدخول</h1>
                        <p className="text-slate-500 mb-6 text-sm">نظام المحاسب القانوني زياد العتيبي</p>
                        <form className="space-y-4" onSubmit={(e) => {
                            e.preventDefault();
                            const email = e.target.email.value.includes('@') ? e.target.email.value : `${e.target.email.value}@acca.app`;
                            window.authActions.signInWithEmailAndPassword(window.auth, email, e.target.password.value)
                                .catch(() => alert('بيانات الدخول غير صحيحة!'));
                        }}>
                            <input name="email" type="text" placeholder="اسم المستخدم" className="w-full border p-3 rounded-lg outline-none focus:ring-2 focus:ring-blue-500" required />
                            <input name="password" type="password" placeholder="كلمة المرور" className="w-full border p-3 rounded-lg outline-none focus:ring-2 focus:ring-blue-500" required />
                            <button className="w-full bg-blue-600 text-white p-3 rounded-lg font-bold hover:bg-blue-700 transition-all">دخول للنظام</button>
                        </form>
                    </div>
                </div>
            );

            return (
                <div className="flex h-screen bg-slate-50">
                    <aside className="w-64 bg-slate-900 text-white p-6 hidden md:block">
                        <div className="text-xl font-bold mb-8 text-blue-400">نظام المحاسبة</div>
                        <div className="space-y-4 text-slate-400">
                            <div className="text-white bg-slate-800 p-2 rounded cursor-pointer">الرئيسية</div>
                            <div className="p-2 hover:text-white cursor-pointer" onClick={() => window.authActions.signOut(window.auth)}>تسجيل الخروج</div>
                        </div>
                    </aside>
                    <main className="flex-1 p-8 overflow-auto">
                        <header className="flex justify-between items-center mb-10 border-b pb-4">
                            <h2 className="text-2xl font-bold">لوحة التحكم</h2>
                            <div className="bg-emerald-100 text-emerald-700 px-4 py-1 rounded-full text-sm font-bold">
                                متصل: {user.email.split('@')[0]}
                            </div>
                        </header>
                        <div className="bg-white p-10 rounded-2xl shadow-sm border border-slate-200 text-center">
                            <h3 className="text-xl text-slate-600">أهلاً بك في نظامك المحاسبي</h3>
                            <p className="mt-4 text-slate-400">بإمكانك الآن البدء في إدخال القيود ومتابعة التقارير المالية.</p>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
