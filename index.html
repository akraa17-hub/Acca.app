<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>برنامج محاسبي - المحاسب القانوني المستقبلي زياد العتيبي</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- ✅ Firebase Compat SDK (يعمل بشكل متزامن بدون import/export) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #f8fafc; }
        @media print {
            .no-print { display: none !important; }
            aside { display: none !important; }
            main { margin: 0 !important; padding: 0 !important; overflow: visible !important; }
            .printable-content { width: 100% !important; }
            header { display: none !important; }
            body { background: white !important; }
            .break-inside-avoid { break-inside: avoid; }
        }
        @page { margin: 2cm; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- ✅ تهيئة Firebase بالطريقة الصحيحة (compat) قبل React -->
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDUcQyht2D6vpuUZyCQTxEqtLZf4Feo5aM",
            authDomain: "acca-app-80ca8.firebaseapp.com",
            projectId: "acca-app-80ca8",
            storageBucket: "acca-app-80ca8.firebasestorage.app",
            messagingSenderId: "196121768353",
            appId: "1:196121768353:web:e0623f775bb3f0409e1be0"
        };

        firebase.initializeApp(firebaseConfig);

        // متاح فوراً لكود React بدون أي تأخير
        window.db   = firebase.firestore();
        window.auth = firebase.auth();
    </script>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // --- مكون للأيقونات ---
        const LucideIcon = ({ name, size = 24, className = "" }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name} width={size} height={size} className={className}></i>;
        };

        const Home            = (p) => <LucideIcon name="home"            {...p} />;
        const Book            = (p) => <LucideIcon name="book"            {...p} />;
        const PieChart        = (p) => <LucideIcon name="pie-chart"       {...p} />;
        const Plus            = (p) => <LucideIcon name="plus"            {...p} />;
        const Trash2          = (p) => <LucideIcon name="trash-2"         {...p} />;
        const Save            = (p) => <LucideIcon name="save"            {...p} />;
        const ArrowLeft       = (p) => <LucideIcon name="arrow-left"      {...p} />;
        const Filter          = (p) => <LucideIcon name="filter"          {...p} />;
        const Edit            = (p) => <LucideIcon name="edit"            {...p} />;
        const Menu            = (p) => <LucideIcon name="menu"            {...p} />;
        const Printer         = (p) => <LucideIcon name="printer"         {...p} />;
        const FileSpreadsheet = (p) => <LucideIcon name="file-spreadsheet" {...p} />;
        const LogOut          = (p) => <LucideIcon name="log-out"         {...p} />;

        // ─────────────────────────────────────────────
        // شاشة تسجيل الدخول
        // ─────────────────────────────────────────────
        const LoginScreen = () => {
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const [error,    setError]    = useState('');
            const [loading,  setLoading]  = useState(false);

            const handleLogin = async (e) => {
                e.preventDefault();
                setError('');
                setLoading(true);
                try {
                    let email = username.trim();
                    if (!email.includes('@')) email = email + '@acca.app';
                    await window.auth.signInWithEmailAndPassword(email, password);
                } catch (err) {
                    setError('اسم المستخدم أو كلمة المرور غير صحيحة!');
                    setLoading(false);
                }
            };

            return (
                <div className="flex h-screen items-center justify-center bg-slate-100 font-sans" dir="rtl">
                    <div className="bg-white p-8 rounded-2xl shadow-lg max-w-md w-full border border-slate-200">
                        <div className="text-center mb-8">
                            <div className="w-16 h-16 bg-blue-600 rounded-full flex items-center justify-center mx-auto mb-4 shadow-md">
                                <Book className="text-white" size={32} />
                            </div>
                            <h1 className="text-2xl font-bold text-slate-800">تسجيل الدخول</h1>
                            <p className="text-slate-500 text-sm mt-2">نظام المحاسبة السحابي – المحاسب القانوني المستقبلي زياد العتيبي</p>
                        </div>

                        {error && (
                            <div className="bg-red-50 text-red-600 p-3 rounded-lg text-sm mb-4 border border-red-200 text-center">{error}</div>
                        )}

                        <form onSubmit={handleLogin} className="space-y-4">
                            <div>
                                <label className="block text-sm font-medium text-slate-700 mb-1">اسم المستخدم</label>
                                <input type="text" value={username} onChange={e => setUsername(e.target.value)}
                                    className="w-full border border-slate-300 p-3 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none bg-slate-50"
                                    placeholder="مثال: admin أو student" required />
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-slate-700 mb-1">كلمة المرور</label>
                                <input type="password" value={password} onChange={e => setPassword(e.target.value)}
                                    className="w-full border border-slate-300 p-3 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none bg-slate-50"
                                    placeholder="••••••••" required />
                            </div>
                            <button disabled={loading} type="submit"
                                className={`w-full text-white font-bold py-3 rounded-lg transition-colors mt-4 flex justify-center items-center gap-2 ${loading ? 'bg-blue-400 cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-700 shadow-md'}`}>
                                {loading ? 'جاري الدخول...' : 'دخول للنظام'}
                            </button>
                        </form>
                    </div>
                </div>
            );
        };

        // ─────────────────────────────────────────────
        // التطبيق الرئيسي
        // ─────────────────────────────────────────────
        function App() {
            const [activeTab,      setActiveTab]      = useState('dashboard');
            const [isSidebarOpen,  setIsSidebarOpen]  = useState(true);
            const [isLoaded,       setIsLoaded]       = useState(false);
            const [user,           setUser]           = useState(null);
            const [authChecking,   setAuthChecking]   = useState(true);
            const [accounts,       setAccounts]       = useState([]);
            const [journalEntries, setJournalEntries] = useState([]);

            // ✅ مراقبة حالة المصادقة مباشرةً (بدون setTimeout)
            useEffect(() => {
                const unsubAuth = window.auth.onAuthStateChanged((currentUser) => {
                    setUser(currentUser);
                    setAuthChecking(false);
                });
                return () => unsubAuth();
            }, []);

            // ✅ تحميل البيانات من Firestore عند تسجيل الدخول
            useEffect(() => {
                if (!user) return;

                const db = window.db;

                const unsubAccounts = db.collection("accounts").onSnapshot((snapshot) => {
                    if (snapshot.empty) {
                        const initialAccounts = [
                            { id: '1',    code: '1',    name: 'الأصول',              type: 'asset',     level: 1, parentId: null },
                            { id: '11',   code: '11',   name: 'الأصول المتداولة',    type: 'asset',     level: 2, parentId: '1'  },
                            { id: '1101', code: '1101', name: 'النقدية في الصندوق',  type: 'asset',     level: 3, parentId: '11' },
                            { id: '1102', code: '1102', name: 'البنك - الأهلي',      type: 'asset',     level: 3, parentId: '11' },
                            { id: '1103', code: '1103', name: 'العملاء',             type: 'asset',     level: 3, parentId: '11' },
                            { id: '2',    code: '2',    name: 'الخصوم',              type: 'liability', level: 1, parentId: null },
                            { id: '21',   code: '21',   name: 'الخصوم المتداولة',   type: 'liability', level: 2, parentId: '2'  },
                            { id: '2101', code: '2101', name: 'الموردين',            type: 'liability', level: 3, parentId: '21' },
                            { id: '3',    code: '3',    name: 'حقوق الملكية',        type: 'equity',    level: 1, parentId: null },
                            { id: '3101', code: '3101', name: 'رأس المال',           type: 'equity',    level: 3, parentId: '3'  },
                            { id: '4',    code: '4',    name: 'الإيرادات',           type: 'revenue',   level: 1, parentId: null },
                            { id: '4101', code: '4101', name: 'إيرادات المبيعات',    type: 'revenue',   level: 3, parentId: '4'  },
                            { id: '5',    code: '5',    name: 'المصروفات',           type: 'expense',   level: 1, parentId: null },
                            { id: '5101', code: '5101', name: 'مصروفات الإيجار',    type: 'expense',   level: 3, parentId: '5'  },
                            { id: '5102', code: '5102', name: 'مصروفات الكهرباء',   type: 'expense',   level: 3, parentId: '5'  },
                        ];
                        initialAccounts.forEach(acc => {
                            const { id, ...data } = acc;
                            db.collection("accounts").doc(id).set(data);
                        });
                    } else {
                        setAccounts(snapshot.docs.map(d => ({ ...d.data(), id: d.id })));
                    }
                });

                const unsubJournals = db.collection("journalEntries").onSnapshot((snapshot) => {
                    const entries = snapshot.docs.map(d => ({ ...d.data(), id: d.id }));
                    setJournalEntries(entries.sort((a, b) => a.id.localeCompare(b.id)));
                    setIsLoaded(true);
                });

                return () => { unsubAccounts(); unsubJournals(); };
            }, [user]);

            const handleLogout = () => {
                if (window.confirm('هل تريد تسجيل الخروج من النظام؟')) {
                    window.auth.signOut();
                }
            };

            // ─── حساب الرصيد ───
            const getAccountBalance = (accountId) => {
                let balance = 0;
                const account = accounts.find(a => a.id === accountId);
                if (!account) return 0;
                journalEntries.forEach(entry => {
                    entry.lines.forEach(line => {
                        if (line.accountId === accountId) {
                            if (['asset', 'expense'].includes(account.type)) {
                                balance += (Number(line.debit) - Number(line.credit));
                            } else {
                                balance += (Number(line.credit) - Number(line.debit));
                            }
                        }
                    });
                });
                return balance;
            };

            // ─── توليد الكود التالي ───
            const generateNextCode = (parentAccount) => {
                if (!parentAccount) {
                    const rootAccounts = accounts.filter(a => !a.parentId);
                    if (rootAccounts.length === 0) return '1';
                    return (Math.max(...rootAccounts.map(a => parseInt(a.code))) + 1).toString();
                }
                const siblings = accounts.filter(a => a.parentId === parentAccount.id);
                if (siblings.length > 0) {
                    return (Math.max(...siblings.map(a => parseInt(a.code))) + 1).toString();
                }
                if (parentAccount.code.length === 1) return `${parentAccount.code}1`;
                return `${parentAccount.code}01`;
            };

            // ─── تصدير CSV ───
            const exportToCSV = (filename, rows) => {
                const csvContent = "\uFEFF" + rows.map(e => e.join(",")).join("\n");
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                link.setAttribute("href", URL.createObjectURL(blob));
                link.setAttribute("download", `${filename}.csv`);
                link.style.visibility = 'hidden';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            const handlePrint = () => window.print();

            // ─────────────────────────────────────────────
            // دليل الحسابات
            // ─────────────────────────────────────────────
            const ChartOfAccountsView = () => {
                const [formData,  setFormData]  = useState({ id: '', code: '', name: '', type: 'asset', parentId: '' });
                const [isEditing, setIsEditing] = useState(false);

                useEffect(() => {
                    if (!isEditing && !formData.code && accounts.length > 0) {
                        setFormData(prev => ({ ...prev, code: generateNextCode(null) }));
                    }
                }, [accounts, isEditing]);

                const potentialParents = accounts.filter(a => a.level < 3);

                const handleParentChange = (e) => {
                    const pid = e.target.value;
                    const parentAcc = accounts.find(a => a.id === pid);
                    setFormData({ ...formData, parentId: pid, code: generateNextCode(parentAcc || null), type: parentAcc ? parentAcc.type : 'asset' });
                };

                const handleSubmit = async () => {
                    if (!formData.code || !formData.name) return;
                    let level = 1;
                    if (formData.parentId) {
                        const parent = accounts.find(a => a.id === formData.parentId);
                        if (parent) level = parent.level + 1;
                    }
                    const accountData = { code: formData.code, name: formData.name, type: formData.type, parentId: formData.parentId || null, level };
                    try {
                        await window.db.collection("accounts").doc(formData.code).set(accountData);
                        setIsEditing(false);
                        setFormData({ id: '', code: generateNextCode(null), name: '', type: 'asset', parentId: '' });
                    } catch(e) { alert("حدث خطأ أثناء حفظ الحساب"); }
                };

                const handleEditClick = (account) => {
                    setFormData(account);
                    setIsEditing(true);
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                };

                const handleAddSubAccount = (parentAccount) => {
                    setFormData({ id: '', code: generateNextCode(parentAccount), name: '', type: parentAccount.type, parentId: parentAccount.id });
                    setIsEditing(false);
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                };

                const handleDeleteClick = async (id) => {
                    if (!window.confirm('هل أنت متأكد من حذف هذا الحساب؟')) return;
                    const isUsed = journalEntries.some(entry => entry.lines.some(line => line.accountId === id));
                    if (isUsed) { alert('لا يمكن حذف حساب تم استخدامه في قيود يومية.'); return; }
                    const hasChildren = accounts.some(a => a.parentId === id);
                    if (hasChildren) { alert('لا يمكن حذف حساب رئيسي يحتوي على حسابات فرعية.'); return; }
                    try { await window.db.collection("accounts").doc(id).delete(); } catch(e) {}
                };

                const handleCancel = () => {
                    setIsEditing(false);
                    setFormData({ id: '', code: generateNextCode(null), name: '', type: 'asset', parentId: '' });
                };

                return (
                    <div className="space-y-6 printable-content">
                        <div className="flex justify-between items-center no-print">
                            <h2 className="text-2xl font-bold text-slate-800">دليل الحسابات</h2>
                        </div>

                        <div className="bg-slate-50 p-4 rounded-xl border border-slate-200 no-print">
                            <h3 className="text-sm font-bold text-slate-700 mb-3">{isEditing ? 'تعديل بيانات الحساب' : 'إضافة حساب جديد'}</h3>
                            <div className="flex flex-wrap gap-2 items-end">
                                <div className="w-32">
                                    <label className="text-xs text-slate-500 block mb-1">الكود (تلقائي)</label>
                                    <input className="border p-2 rounded text-sm w-full bg-slate-100 text-slate-500 cursor-not-allowed" value={formData.code} readOnly />
                                </div>
                                <div className="w-48">
                                    <label className="text-xs text-slate-500 block mb-1">الحساب الرئيسي (الأب)</label>
                                    <select className="border p-2 rounded text-sm w-full" value={formData.parentId || ''} onChange={handleParentChange} disabled={isEditing}>
                                        <option value="">-- حساب رئيسي (مستوى 1) --</option>
                                        {potentialParents.map(p => <option key={p.id} value={p.id}>{p.code} - {p.name}</option>)}
                                    </select>
                                </div>
                                <div className="flex-1 min-w-[200px]">
                                    <label className="text-xs text-slate-500 block mb-1">اسم الحساب</label>
                                    <input className="border p-2 rounded text-sm w-full" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} placeholder="أدخل اسم الحساب" />
                                </div>
                                <div className="w-32">
                                    <label className="text-xs text-slate-500 block mb-1">النوع</label>
                                    <select className="border p-2 rounded text-sm w-full" value={formData.type} onChange={e => setFormData({...formData, type: e.target.value})} disabled={!!formData.parentId}>
                                        <option value="asset">أصول</option>
                                        <option value="liability">خصوم</option>
                                        <option value="equity">حقوق ملكية</option>
                                        <option value="revenue">إيرادات</option>
                                        <option value="expense">مصروفات</option>
                                    </select>
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={handleSubmit} className={`px-4 py-2 rounded text-white text-sm flex items-center gap-1 ${isEditing ? 'bg-emerald-600 hover:bg-emerald-700' : 'bg-blue-600 hover:bg-blue-700'}`}>
                                        {isEditing ? <Save size={16}/> : <Plus size={16}/>} {isEditing ? 'حفظ' : 'إضافة'}
                                    </button>
                                    {(isEditing || formData.parentId) && (
                                        <button onClick={handleCancel} className="px-3 py-2 rounded bg-slate-200 hover:bg-slate-300 text-slate-600 text-sm">إلغاء</button>
                                    )}
                                </div>
                            </div>
                        </div>

                        <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                            <table className="w-full text-right">
                                <thead className="bg-slate-50 text-slate-600 text-sm">
                                    <tr>
                                        <th className="px-6 py-3">الكود</th>
                                        <th className="px-6 py-3">اسم الحساب</th>
                                        <th className="px-6 py-3">النوع</th>
                                        <th className="px-6 py-3">المستوى</th>
                                        <th className="px-6 py-3">الرصيد الحالي</th>
                                        <th className="px-6 py-3 text-center no-print">إجراءات</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100">
                                    {[...accounts].sort((a,b) => a.code.localeCompare(b.code)).map((acc) => (
                                        <tr key={acc.id} className="hover:bg-slate-50">
                                            <td className="px-6 py-3 font-mono text-slate-500">{acc.code}</td>
                                            <td className="px-6 py-3 font-medium text-slate-800">
                                                <div style={{ paddingRight: `${(acc.level - 1) * 24}px` }} className="flex items-center gap-2">
                                                    {acc.level > 1 && <span className="text-slate-300">↳</span>} {acc.name}
                                                </div>
                                            </td>
                                            <td className="px-6 py-3 text-sm">
                                                <span className={`px-2 py-1 rounded-full text-xs ${acc.type === 'asset' ? 'bg-emerald-100 text-emerald-700' : acc.type === 'liability' ? 'bg-red-100 text-red-700' : acc.type === 'equity' ? 'bg-purple-100 text-purple-700' : 'bg-blue-100 text-blue-700'}`}>
                                                    {acc.type === 'asset' ? 'أصول' : acc.type === 'liability' ? 'خصوم' : acc.type === 'equity' ? 'ملكية' : acc.type === 'revenue' ? 'إيراد' : 'مصروف'}
                                                </span>
                                            </td>
                                            <td className="px-6 py-3 text-slate-500">{acc.level}</td>
                                            <td className="px-6 py-3 font-bold">{getAccountBalance(acc.id).toLocaleString()}</td>
                                            <td className="px-6 py-3 flex justify-center gap-2 no-print">
                                                {acc.level < 3 && (<button onClick={() => handleAddSubAccount(acc)} className="p-1.5 bg-emerald-50 text-emerald-600 hover:bg-emerald-100 rounded border border-emerald-200" title="إضافة حساب فرعي"><Plus size={16} /></button>)}
                                                <button onClick={() => handleEditClick(acc)} className="p-1.5 bg-blue-50 text-blue-600 hover:bg-blue-100 rounded border border-blue-200" title="تعديل"><Edit size={16} /></button>
                                                <button onClick={() => handleDeleteClick(acc.id)} className="p-1.5 bg-red-50 text-red-600 hover:bg-red-100 rounded border border-red-200" title="حذف"><Trash2 size={16} /></button>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                );
            };

            // ─────────────────────────────────────────────
            // قيود اليومية
            // ─────────────────────────────────────────────
            const JournalEntriesView = () => {
                const emptyEntry = { date: new Date().toISOString().split('T')[0], description: '', lines: [{ accountId: '', debit: 0, credit: 0, note: '' }, { accountId: '', debit: 0, credit: 0, note: '' }] };
                const [viewMode,  setViewMode]  = useState('list');
                const [editingId, setEditingId] = useState(null);
                const [newEntry,  setNewEntry]  = useState(emptyEntry);

                const totalDebit  = newEntry.lines.reduce((sum, l) => sum + Number(l.debit),  0);
                const totalCredit = newEntry.lines.reduce((sum, l) => sum + Number(l.credit), 0);
                const isBalanced  = totalDebit === totalCredit && totalDebit > 0;

                const handleAddLine = () => setNewEntry({...newEntry, lines: [...newEntry.lines, { accountId: '', debit: 0, credit: 0, note: '' }]});

                const handleLineChange = (index, field, value) => {
                    const updatedLines = [...newEntry.lines];
                    updatedLines[index][field] = value;
                    if (field === 'debit'  && value > 0) updatedLines[index].credit = 0;
                    if (field === 'credit' && value > 0) updatedLines[index].debit  = 0;
                    setNewEntry({...newEntry, lines: updatedLines});
                };

                const handleRemoveLine = (index) => {
                    if (newEntry.lines.length > 2) setNewEntry({...newEntry, lines: newEntry.lines.filter((_, i) => i !== index)});
                };

                const handleEditEntry = (entry) => {
                    setNewEntry(entry);
                    setEditingId(entry.id);
                    setViewMode('create');
                };

                const handleDeleteEntry = async (id) => {
                    if (window.confirm('هل أنت متأكد من مسح وإلغاء هذا القيد نهائياً؟')) {
                        try {
                            await window.db.collection("journalEntries").doc(id).delete();
                        } catch(e) { alert("حدث خطأ أثناء حذف القيد."); }
                    }
                };

                const saveEntry = async () => {
                    if (!isBalanced || !newEntry.description) return;
                    const entryData = { date: newEntry.date, description: newEntry.description, lines: newEntry.lines, userEmail: user.email };
                    try {
                        if (editingId) {
                            await window.db.collection("journalEntries").doc(editingId).update(entryData);
                        } else {
                            await window.db.collection("journalEntries").doc(Date.now().toString()).set(entryData);
                        }
                        setViewMode('list');
                        setEditingId(null);
                        setNewEntry(emptyEntry);
                    } catch(e) { alert("حدث خطأ أثناء حفظ القيد"); }
                };

                const handleExportJournalExcel = () => {
                    const rows = [["رقم القيد", "التاريخ", "البيان", "اسم الحساب", "ملاحظات", "مدين", "دائن", "المدخل"]];
                    journalEntries.forEach(entry => {
                        entry.lines.forEach(line => {
                            const accName = accounts.find(a => a.id === line.accountId)?.name || line.accountId;
                            rows.push([entry.id, entry.date, entry.description, accName, line.note, line.debit, line.credit, entry.userEmail || '-']);
                        });
                    });
                    exportToCSV("journal_entries", rows);
                };

                if (viewMode === 'create') {
                    return (
                        <div className="space-y-6">
                            <div className="flex items-center gap-4">
                                <button onClick={() => { setViewMode('list'); setEditingId(null); }} className="p-2 hover:bg-slate-100 rounded-full"><ArrowLeft size={20} /></button>
                                <h2 className="text-2xl font-bold text-slate-800">{editingId ? 'تعديل قيد' : 'قيد يومية جديد'}</h2>
                            </div>
                            <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                                <div className="grid grid-cols-2 gap-6 mb-6">
                                    <div>
                                        <label className="block text-sm font-medium text-slate-700 mb-2">التاريخ</label>
                                        <input type="date" value={newEntry.date} onChange={e => setNewEntry({...newEntry, date: e.target.value})} className="w-full border p-2 rounded-lg" />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-slate-700 mb-2">الوصف / البيان</label>
                                        <input type="text" value={newEntry.description} onChange={e => setNewEntry({...newEntry, description: e.target.value})} className="w-full border p-2 rounded-lg" placeholder="شرح القيد..." />
                                    </div>
                                </div>
                                <div className="border rounded-lg overflow-hidden mb-4">
                                    <table className="w-full text-right bg-slate-50">
                                        <thead className="text-xs text-slate-500 font-semibold border-b">
                                            <tr>
                                                <th className="px-4 py-2 w-1/3">الحساب</th>
                                                <th className="px-4 py-2 w-24">مدين</th>
                                                <th className="px-4 py-2 w-24">دائن</th>
                                                <th className="px-4 py-2">ملاحظات</th>
                                                <th className="px-4 py-2 w-10"></th>
                                            </tr>
                                        </thead>
                                        <tbody className="bg-white divide-y">
                                            {newEntry.lines.map((line, idx) => (
                                                <tr key={idx}>
                                                    <td className="p-2">
                                                        <select className="w-full p-2 border rounded" value={line.accountId} onChange={e => handleLineChange(idx, 'accountId', e.target.value)}>
                                                            <option value="">-- اختر الحساب --</option>
                                                            {accounts.filter(a => a.level === 3).map(acc => <option key={acc.id} value={acc.id}>{acc.code} - {acc.name}</option>)}
                                                        </select>
                                                    </td>
                                                    <td className="p-2"><input type="number" min="0" className="w-full p-2 border rounded bg-slate-50 focus:bg-white" value={line.debit}  onChange={e => handleLineChange(idx, 'debit',  e.target.value)} /></td>
                                                    <td className="p-2"><input type="number" min="0" className="w-full p-2 border rounded bg-slate-50 focus:bg-white" value={line.credit} onChange={e => handleLineChange(idx, 'credit', e.target.value)} /></td>
                                                    <td className="p-2"><input type="text"   className="w-full p-2 border rounded" value={line.note} onChange={e => handleLineChange(idx, 'note', e.target.value)} /></td>
                                                    <td className="p-2 text-center"><button onClick={() => handleRemoveLine(idx)} className="text-red-400 hover:text-red-600"><Trash2 size={16} /></button></td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                                <button onClick={handleAddLine} className="text-blue-600 text-sm font-medium hover:underline mb-6 flex items-center gap-1"><Plus size={16} /> إضافة سطر</button>
                                <div className="flex justify-between items-center border-t pt-4">
                                    <div className="flex gap-8 text-sm">
                                        <div className={`font-bold ${totalDebit === totalCredit ? 'text-emerald-600' : 'text-red-500'}`}>إجمالي المدين: {totalDebit.toLocaleString()}</div>
                                        <div className={`font-bold ${totalDebit === totalCredit ? 'text-emerald-600' : 'text-red-500'}`}>إجمالي الدائن: {totalCredit.toLocaleString()}</div>
                                        <div className="text-slate-400">الفرق: {Math.abs(totalDebit - totalCredit).toLocaleString()}</div>
                                    </div>
                                    <button onClick={saveEntry} disabled={!isBalanced} className={`px-6 py-2 rounded-lg text-white flex items-center gap-2 ${isBalanced ? 'bg-blue-600 hover:bg-blue-700' : 'bg-slate-300 cursor-not-allowed'}`}>
                                        <Save size={18} /> حفظ القيد
                                    </button>
                                </div>
                            </div>
                        </div>
                    );
                }

                return (
                    <div className="space-y-6 printable-content">
                        <div className="flex justify-between items-center no-print">
                            <h2 className="text-2xl font-bold text-slate-800">قيود اليومية</h2>
                            <div className="flex gap-2">
                                <button onClick={handleExportJournalExcel} className="bg-emerald-100 hover:bg-emerald-200 text-emerald-700 px-4 py-2 rounded-lg flex items-center gap-2 shadow-sm border border-emerald-200">
                                    <FileSpreadsheet size={18} /><span>تصدير Excel</span>
                                </button>
                                <button onClick={() => setViewMode('create')} className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg flex items-center gap-2 shadow-sm">
                                    <Plus size={18} /><span>قيد جديد</span>
                                </button>
                            </div>
                        </div>
                        {journalEntries.length === 0 ? (
                            <div className="text-center py-12 bg-white rounded-xl border border-slate-200 text-slate-500">لا توجد قيود يومية مدخلة حتى الآن.</div>
                        ) : (
                            <div className="space-y-4">
                                {journalEntries.map(entry => (
                                    <div key={entry.id} className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                                        <div className="bg-slate-50 px-6 py-3 border-b flex justify-between items-center">
                                            <div>
                                                <span className="text-sm font-bold text-slate-700">{entry.date}</span>
                                                {entry.userEmail && <span className="text-xs text-slate-400 mr-4 bg-slate-200 px-2 py-0.5 rounded-full">بواسطة: {entry.userEmail.split('@')[0]}</span>}
                                            </div>
                                            <div className="flex items-center gap-3">
                                                <span className="text-slate-600 font-medium ml-4">{entry.description}</span>
                                                <button onClick={() => handleEditEntry(entry)} className="p-1.5 text-blue-600 hover:bg-blue-100 rounded-md no-print" title="تعديل القيد"><Edit size={16} /></button>
                                                <button onClick={() => handleDeleteEntry(entry.id)} className="p-1.5 text-red-600 hover:bg-red-100 rounded-md no-print" title="حذف القيد"><Trash2 size={16} /></button>
                                            </div>
                                        </div>
                                        <table className="w-full text-right text-sm">
                                            <thead className="text-slate-400 font-normal">
                                                <tr><th className="px-6 py-2 w-1/2">الحساب</th><th className="px-6 py-2">مدين</th><th className="px-6 py-2">دائن</th></tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100">
                                                {entry.lines.map((line, idx) => {
                                                    const accName = accounts.find(a => a.id === line.accountId)?.name || line.accountId;
                                                    return (
                                                        <tr key={idx}>
                                                            <td className="px-6 py-2 text-slate-700">{accName} <span className="text-slate-400 text-xs mr-2">{line.note}</span></td>
                                                            <td className="px-6 py-2 font-mono text-slate-600">{line.debit  > 0 ? Number(line.debit).toLocaleString()  : '-'}</td>
                                                            <td className="px-6 py-2 font-mono text-slate-600">{line.credit > 0 ? Number(line.credit).toLocaleString() : '-'}</td>
                                                        </tr>
                                                    );
                                                })}
                                            </tbody>
                                        </table>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                );
            };

            // ─────────────────────────────────────────────
            // دفتر الأستاذ
            // ─────────────────────────────────────────────
            const GeneralLedgerView = () => {
                const getAccountEntries = (accountId) => {
                    const entries = [];
                    let runningBalance = 0;
                    const acc = accounts.find(a => a.id === accountId);
                    if (!acc) return [];
                    const isDebitNature = ['asset', 'expense'].includes(acc.type);
                    journalEntries.forEach(entry => {
                        entry.lines.forEach(line => {
                            if (line.accountId === accountId) {
                                runningBalance += isDebitNature ? (Number(line.debit) - Number(line.credit)) : (Number(line.credit) - Number(line.debit));
                                entries.push({ date: entry.date, desc: entry.description, note: line.note, debit: line.debit, credit: line.credit, balance: runningBalance });
                            }
                        });
                    });
                    return entries;
                };

                const activeAccounts = useMemo(() =>
                    accounts.filter(a => a.level === 3)
                        .map(acc => ({ ...acc, movements: getAccountEntries(acc.id) }))
                        .filter(acc => acc.movements.length > 0),
                [accounts, journalEntries]);

                return (
                    <div className="space-y-8 printable-content">
                        <div className="flex justify-between items-center no-print">
                            <h2 className="text-2xl font-bold text-slate-800">دفتر الأستاذ العام</h2>
                            <button onClick={handlePrint} className="bg-slate-100 hover:bg-slate-200 text-slate-700 px-4 py-2 rounded-lg flex items-center gap-2 border border-slate-200"><Printer size={18} /> طباعة</button>
                        </div>
                        {activeAccounts.length === 0 ? (
                            <div className="text-center py-12 bg-white rounded-xl border border-slate-200 text-slate-500">لا توجد حركات مسجلة لعرضها في دفتر الأستاذ.</div>
                        ) : (
                            activeAccounts.map(acc => (
                                <div key={acc.id} className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden break-inside-avoid">
                                    <div className="p-4 bg-slate-50 border-b font-bold text-lg text-slate-700 flex justify-between">
                                        <span>{acc.code} - {acc.name}</span>
                                        <span className="text-sm font-normal text-slate-500 bg-white px-2 py-1 rounded border">الرصيد النهائي: {acc.movements[acc.movements.length-1].balance.toLocaleString()}</span>
                                    </div>
                                    <table className="w-full text-right">
                                        <thead className="bg-white text-slate-600 text-sm border-b">
                                            <tr><th className="px-6 py-2">التاريخ</th><th className="px-6 py-2">البيان</th><th className="px-6 py-2">مدين</th><th className="px-6 py-2">دائن</th><th className="px-6 py-2">الرصيد</th></tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {acc.movements.map((row, idx) => (
                                                <tr key={idx} className="hover:bg-slate-50 text-sm">
                                                    <td className="px-6 py-2 text-slate-600">{row.date}</td>
                                                    <td className="px-6 py-2 font-medium text-slate-800">{row.desc} {row.note && <span className="text-xs text-slate-400 block">{row.note}</span>}</td>
                                                    <td className="px-6 py-2 text-emerald-600">{row.debit  > 0 ? Number(row.debit).toLocaleString()  : '-'}</td>
                                                    <td className="px-6 py-2 text-red-600">   {row.credit > 0 ? Number(row.credit).toLocaleString() : '-'}</td>
                                                    <td className="px-6 py-2 font-bold">{row.balance.toLocaleString()}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            ))
                        )}
                    </div>
                );
            };

            // ─────────────────────────────────────────────
            // القوائم المالية
            // ─────────────────────────────────────────────
            const FinancialStatementsView = () => {
                const [reportType, setReportType] = useState('income');

                const calcByType = (type) => accounts.filter(a => a.type === type && a.level === 3).reduce((sum, acc) => sum + getAccountBalance(acc.id), 0);
                const revenues  = calcByType('revenue');
                const expenses  = calcByType('expense');
                const netIncome = revenues - expenses;
                const assets    = calcByType('asset');
                const liabilities = calcByType('liability');
                const equity    = calcByType('equity') + netIncome;

                const trialBalanceData = accounts.filter(a => a.level === 3).map(acc => {
                    const balance = getAccountBalance(acc.id);
                    const isDebit = ['asset', 'expense'].includes(acc.type);
                    return { ...acc, balance, debitBalance: isDebit ? balance : 0, creditBalance: !isDebit ? balance : 0 };
                }).filter(acc => acc.balance !== 0);

                const totalTrialDebit  = trialBalanceData.reduce((sum, acc) => sum + (acc.debitBalance  > 0 ? acc.debitBalance  : 0), 0);
                const totalTrialCredit = trialBalanceData.reduce((sum, acc) => sum + (acc.creditBalance > 0 ? acc.creditBalance : 0), 0);

                return (
                    <div className="space-y-6 printable-content">
                        <div className="flex flex-col md:flex-row justify-between items-center gap-4 no-print">
                            <h2 className="text-2xl font-bold text-slate-800">القوائم المالية</h2>
                            <button onClick={handlePrint} className="bg-slate-100 hover:bg-slate-200 text-slate-700 px-3 py-1 rounded text-sm flex items-center gap-1 border border-slate-200"><Printer size={16} /> طباعة / PDF</button>
                            <div className="flex bg-white rounded-lg border p-1 shadow-sm">
                                {[['income','قائمة الدخل'],['balance','المركز المالي'],['trial','ميزان المراجعة']].map(([id, label]) => (
                                    <button key={id} onClick={() => setReportType(id)} className={`px-4 py-2 rounded text-sm ${reportType === id ? 'bg-blue-100 text-blue-700 font-bold' : 'text-slate-500 hover:bg-slate-50'}`}>{label}</button>
                                ))}
                            </div>
                        </div>

                        <div className="bg-white p-8 rounded-xl shadow-sm border border-slate-200 max-w-4xl mx-auto">
                            <div className="text-center mb-8 border-b pb-4">
                                <h1 className="text-xl font-bold text-slate-800">المحاسب القانوني المستقبلي زياد العتيبي</h1>
                                <h2 className="text-lg text-slate-600 mt-2">{reportType === 'income' ? 'قائمة الدخل' : reportType === 'balance' ? 'الميزانية العمومية' : 'ميزان المراجعة بالأرصدة'}</h2>
                                <p className="text-sm text-slate-400 mt-1">كما في {new Date().toLocaleDateString('ar-SA')}</p>
                            </div>

                            {reportType === 'trial' && (
                                <table className="w-full text-right border-collapse">
                                    <thead className="bg-slate-50 text-slate-700 text-sm border-b border-t border-slate-200">
                                        <tr><th className="px-4 py-2 border-l">كود الحساب</th><th className="px-4 py-2 border-l">اسم الحساب</th><th className="px-4 py-2 border-l text-center">أرصدة مدينة</th><th className="px-4 py-2 text-center">أرصدة دائنة</th></tr>
                                    </thead>
                                    <tbody className="text-sm text-slate-600 divide-y divide-slate-100">
                                        {trialBalanceData.map(acc => (
                                            <tr key={acc.id} className="hover:bg-slate-50">
                                                <td className="px-4 py-2 border-l font-mono">{acc.code}</td>
                                                <td className="px-4 py-2 border-l">{acc.name}</td>
                                                <td className="px-4 py-2 border-l text-center">{acc.debitBalance  > 0 ? acc.debitBalance.toLocaleString()  : '-'}</td>
                                                <td className="px-4 py-2 text-center">         {acc.creditBalance > 0 ? acc.creditBalance.toLocaleString() : '-'}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                    <tfoot className="bg-slate-100 font-bold text-slate-800">
                                        <tr>
                                            <td colSpan="2" className="px-4 py-3 border-l text-left pl-8">الإجمالي</td>
                                            <td className="px-4 py-3 border-l text-center text-emerald-700">{totalTrialDebit.toLocaleString()}</td>
                                            <td className="px-4 py-3 text-center text-emerald-700">{totalTrialCredit.toLocaleString()}</td>
                                        </tr>
                                    </tfoot>
                                </table>
                            )}

                            {reportType === 'income' && (
                                <table className="w-full text-right border-collapse text-sm">
                                    <thead className="bg-slate-50 text-slate-700 font-bold border-t border-b border-slate-200">
                                        <tr><th className="px-4 py-3 border-l w-1/2">البيان</th><th className="px-4 py-3 border-l text-center w-1/4">جزئي</th><th className="px-4 py-3 text-center w-1/4">كلي</th></tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100 text-slate-700">
                                        <tr className="bg-slate-50 font-bold"><td colSpan="3" className="px-4 py-2">الإيرادات</td></tr>
                                        {accounts.filter(a => a.type === 'revenue' && a.level === 3).map(acc => {
                                            const bal = getAccountBalance(acc.id);
                                            if (bal === 0) return null;
                                            return <tr key={acc.id}><td className="px-8 py-2 border-l">{acc.name}</td><td className="px-4 py-2 border-l text-center">{bal.toLocaleString()}</td><td></td></tr>;
                                        })}
                                        <tr className="font-bold bg-emerald-50 text-emerald-800 border-t border-b"><td className="px-4 py-2 border-l">إجمالي الإيرادات</td><td className="px-4 py-2 border-l text-center"></td><td className="px-4 py-2 text-center">{revenues.toLocaleString()}</td></tr>
                                        <tr className="bg-slate-50 font-bold"><td colSpan="3" className="px-4 py-2">المصروفات</td></tr>
                                        {accounts.filter(a => a.type === 'expense' && a.level === 3).map(acc => {
                                            const bal = getAccountBalance(acc.id);
                                            if (bal === 0) return null;
                                            return <tr key={acc.id}><td className="px-8 py-2 border-l">{acc.name}</td><td className="px-4 py-2 border-l text-center">({bal.toLocaleString()})</td><td></td></tr>;
                                        })}
                                        <tr className="font-bold bg-red-50 text-red-800 border-t border-b"><td className="px-4 py-2 border-l">إجمالي المصروفات</td><td className="px-4 py-2 border-l text-center"></td><td className="px-4 py-2 text-center">({expenses.toLocaleString()})</td></tr>
                                        <tr className="bg-slate-800 text-white font-bold text-lg"><td className="px-4 py-3 border-l">صافي الربح / (الخسارة)</td><td className="px-4 py-3 border-l"></td><td className="px-4 py-3 text-center">{netIncome.toLocaleString()}</td></tr>
                                    </tbody>
                                </table>
                            )}

                            {reportType === 'balance' && (
                                <div className="space-y-6">
                                    {[['asset','الأصول','emerald'], ['liability','الخصوم','red'], ['equity','حقوق الملكية','blue']].map(([type, title, color]) => (
                                        <div key={type}>
                                            <h3 className={`font-bold text-${color}-700 border-b border-${color}-100 pb-2 mb-2`}>{title}</h3>
                                            {accounts.filter(a => a.type === type && getAccountBalance(a.id) !== 0).map(acc => (
                                                <div key={acc.id} className="flex justify-between text-sm text-slate-600 mb-1"><span>{acc.name}</span><span>{getAccountBalance(acc.id).toLocaleString()}</span></div>
                                            ))}
                                            {type === 'equity' && <div className="flex justify-between text-sm text-slate-600 mb-1"><span>أرباح العام</span><span>{netIncome.toLocaleString()}</span></div>}
                                            <div className="flex justify-between font-bold text-slate-800 mt-2 pt-2 border-t">
                                                <span>إجمالي {title}</span>
                                                <span>{(type === 'asset' ? assets : type === 'liability' ? liabilities : equity).toLocaleString()}</span>
                                            </div>
                                        </div>
                                    ))}
                                    <div className="flex justify-between font-bold text-white bg-slate-800 p-4 rounded mt-4">
                                        <span>إجمالي الخصوم وحقوق الملكية</span>
                                        <span>{(liabilities + equity).toLocaleString()}</span>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                );
            };

            // ─────────────────────────────────────────────
            // لوحة التحكم
            // ─────────────────────────────────────────────
            const DashboardView = () => (
                <div className="space-y-6 printable-content">
                    <h2 className="text-2xl font-bold text-slate-800 mb-6 no-print">لوحة التحكم المالية</h2>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        {[
                            ['إجمالي الأصول',     accounts.filter(a => a.type === 'asset').reduce((s, a)     => s + getAccountBalance(a.id), 0), 'slate'],
                            ['إجمالي الالتزامات', accounts.filter(a => a.type === 'liability').reduce((s, a) => s + getAccountBalance(a.id), 0), 'slate'],
                            ['صافي الدخل (تقريبي)', accounts.filter(a => a.type === 'revenue').reduce((s, a) => s + getAccountBalance(a.id), 0) - accounts.filter(a => a.type === 'expense').reduce((s, a) => s + getAccountBalance(a.id), 0), 'blue'],
                        ].map(([label, value, color]) => (
                            <div key={label} className="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                                <p className="text-slate-500 text-sm mb-1">{label}</p>
                                <h3 className={`text-3xl font-bold text-${color}-${color === 'blue' ? '600' : '800'}`}>{value.toLocaleString()}</h3>
                            </div>
                        ))}
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mt-4">
                        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                            <p className="text-slate-500 text-sm mb-3 font-medium">آخر القيود المدخلة</p>
                            {journalEntries.length === 0 ? <p className="text-slate-400 text-sm">لا توجد قيود بعد</p> : (
                                <div className="space-y-2">
                                    {journalEntries.slice(-5).reverse().map(e => (
                                        <div key={e.id} className="flex justify-between text-sm border-b pb-1">
                                            <span className="text-slate-700">{e.description}</span>
                                            <span className="text-slate-400">{e.date}</span>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                            <p className="text-slate-500 text-sm mb-3 font-medium">إحصائيات</p>
                            <div className="space-y-2 text-sm text-slate-700">
                                <div className="flex justify-between"><span>عدد الحسابات</span><span className="font-bold">{accounts.length}</span></div>
                                <div className="flex justify-between"><span>عدد القيود</span><span className="font-bold">{journalEntries.length}</span></div>
                                <div className="flex justify-between"><span>الحسابات التشغيلية</span><span className="font-bold">{accounts.filter(a => a.level === 3).length}</span></div>
                            </div>
                        </div>
                    </div>
                </div>
            );

            // ─────────────────────────────────────────────
            // الشريط الجانبي
            // ─────────────────────────────────────────────
            const SidebarItem = ({ id, label, icon: Icon }) => (
                <button onClick={() => setActiveTab(id)}
                    className={`w-full flex items-center gap-3 px-4 py-3 transition-colors duration-200 ${activeTab === id ? 'bg-blue-600 text-white shadow-md' : 'text-slate-300 hover:bg-slate-800 hover:text-white'}`}>
                    <Icon size={20} />
                    <span className={`font-medium ${!isSidebarOpen && 'hidden'}`}>{label}</span>
                </button>
            );

            // ─── حالات التحميل والمصادقة ───
            if (authChecking) {
                return <div className="flex h-screen items-center justify-center bg-slate-50 text-slate-500">جاري التحقق من حالة الدخول...</div>;
            }
            if (!user) return <LoginScreen />;
            if (!isLoaded) {
                return (
                    <div className="flex h-screen items-center justify-center bg-slate-50" dir="rtl">
                        <div className="text-center">
                            <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto mb-4"></div>
                            <h2 className="text-xl font-bold text-slate-700">جاري تحميل البيانات...</h2>
                        </div>
                    </div>
                );
            }

            // ─── الواجهة الرئيسية ───
            return (
                <div className="flex h-screen bg-slate-50" dir="rtl">
                    <aside className={`bg-slate-900 text-white flex flex-col transition-all duration-300 ${isSidebarOpen ? 'w-64' : 'w-20'} no-print`}>
                        <div className="p-6 border-b border-slate-800 flex items-center justify-between">
                            <div className={`${!isSidebarOpen && 'hidden'}`}>
                                <div className="font-bold text-lg bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400 leading-tight">النظام المحاسبي</div>
                            </div>
                            <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="text-slate-400 hover:text-white"><Menu size={20} /></button>
                        </div>
                        <nav className="flex-1 py-6 space-y-1">
                            <SidebarItem id="dashboard" label="الرئيسية"       icon={Home}    />
                            <SidebarItem id="coa"       label="دليل الحسابات"  icon={Filter}  />
                            <SidebarItem id="journal"   label="قيود اليومية"   icon={Plus}    />
                            <SidebarItem id="ledger"    label="دفتر الأستاذ"   icon={Book}    />
                            <SidebarItem id="reports"   label="القوائم المالية" icon={PieChart} />
                        </nav>
                    </aside>

                    <main className="flex-1 overflow-auto flex flex-col">
                        <header className="bg-white border-b border-slate-200 p-4 px-8 shadow-sm sticky top-0 z-10 flex justify-between items-center no-print">
                            <h1 className="text-xl font-bold text-slate-700">
                                {activeTab === 'dashboard' && 'الرئيسية'}
                                {activeTab === 'coa'       && 'دليل الحسابات'}
                                {activeTab === 'journal'   && 'قيود اليومية'}
                                {activeTab === 'ledger'    && 'دفتر الأستاذ'}
                                {activeTab === 'reports'   && 'التقارير المالية'}
                            </h1>
                            <div className="flex items-center gap-4 text-slate-500 text-sm">
                                <span className="flex items-center gap-1 text-emerald-600 bg-emerald-50 px-2 py-1 rounded">متصل</span>
                                <span className="bg-slate-100 px-3 py-1 rounded font-bold">{user.email.split('@')[0]}</span>
                                <button onClick={handleLogout} className="flex items-center gap-1 text-red-500 hover:text-red-700 bg-red-50 px-3 py-1 rounded" title="تسجيل خروج">
                                    <LogOut size={16} /> خروج
                                </button>
                            </div>
                        </header>

                        <div className="p-8">
                            {activeTab === 'dashboard' && <DashboardView />}
                            {activeTab === 'coa'       && <ChartOfAccountsView />}
                            {activeTab === 'journal'   && <JournalEntriesView />}
                            {activeTab === 'ledger'    && <GeneralLedgerView />}
                            {activeTab === 'reports'   && <FinancialStatementsView />}
                        </div>
                    </main>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
