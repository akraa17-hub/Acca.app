<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>النظام المحاسبي المتكامل - زياد العتيبي</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #f8fafc; }
        .sidebar-active { background-color: #2563eb; color: white; shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, setDoc, updateDoc, deleteDoc, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDUcQyht2D6vpuUZyCQTxEqtLZf4Feo5aM",
            authDomain: "acca-app-80ca8.firebaseapp.com",
            projectId: "acca-app-80ca8",
            storageBucket: "acca-app-80ca8.firebasestorage.app",
            messagingSenderId: "196121768353",
            appId: "1:196121768353:web:e0623f775bb3f0409e1be0"
        };

        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
        window.auth = getAuth(app);
        window.fs = { collection, addDoc, setDoc, updateDoc, deleteDoc, doc, onSnapshot };
        window.authActions = { signInWithEmailAndPassword, signOut, onAuthStateChanged };
        window.dispatchEvent(new Event('firebase-ready'));
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const Icon = ({ name, className = "" }) => {
            useEffect(() => { if(window.lucide) lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={`w-5 h-5 ${className}`}></i>;
        };

        function App() {
            const [user, setUser] = useState(null);
            const [isLoaded, setIsLoaded] = useState(false);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [accounts, setAccounts] = useState([]);
            const [journalEntries, setJournalEntries] = useState([]);

            // الحساب الذي يتم تعديله أو إضافته حالياً
            const [coaForm, setCoaForm] = useState({ id: '', code: '', name: '', type: 'asset', parentId: '' });
            const [isEditingCoa, setIsEditingCoa] = useState(false);

            useEffect(() => {
                const init = () => {
                    window.authActions.onAuthStateChanged(window.auth, (u) => {
                        setUser(u);
                        if (!u) setIsLoaded(true);
                    });
                };
                if (window.authActions) init();
                else window.addEventListener('firebase-ready', init);
            }, []);

            useEffect(() => {
                if (!user) return;
                const unsubAcc = window.fs.onSnapshot(window.fs.collection(window.db, "accounts"), (s) => setAccounts(s.docs.map(d => ({...d.data(), id: d.id}))));
                const unsubJournals = window.fs.onSnapshot(window.fs.collection(window.db, "journalEntries"), (s) => {
                    setJournalEntries(s.docs.map(d => ({...d.data(), id: d.id})));
                    setIsLoaded(true);
                });
                return () => { unsubAcc(); unsubJournals(); };
            }, [user]);

            // --- دوال الدليل المنطقية ---
            const getBalance = (id) => {
                let bal = 0;
                const acc = accounts.find(a => a.id === id);
                if (!acc) return 0;
                journalEntries.forEach(e => e.lines?.forEach(l => {
                    if (l.accountId === id) {
                        if (['asset', 'expense'].includes(acc.type)) bal += (Number(l.debit) - Number(l.credit));
                        else bal += (Number(l.credit) - Number(l.debit));
                    }
                }));
                return bal;
            };

            const generateNextCode = (parent) => {
                const siblings = parent ? accounts.filter(a => a.parentId === parent.id) : accounts.filter(a => !a.parentId);
                if (siblings.length === 0) return parent ? (parent.code.length === 1 ? `${parent.code}1` : `${parent.code}01`) : '1';
                const maxCode = Math.max(...siblings.map(a => parseInt(a.code)));
                return (maxCode + 1).toString();
            };

            const handleSaveAccount = async () => {
                if (!coaForm.name) return alert("يرجى إدخال اسم الحساب");
                const level = coaForm.parentId ? (accounts.find(a => a.id === coaForm.parentId).level + 1) : 1;
                const data = { code: coaForm.code, name: coaForm.name, type: coaForm.type, parentId: coaForm.parentId || null, level };
                try {
                    await window.fs.setDoc(window.fs.doc(window.db, "accounts", coaForm.code), data);
                    setCoaForm({ id: '', code: generateNextCode(null), name: '', type: 'asset', parentId: '' });
                    setIsEditingCoa(false);
                } catch(e) { alert("خطأ في الحفظ"); }
            };

            const deleteAccount = async (id) => {
                if (journalEntries.some(e => e.lines?.some(l => l.accountId === id))) return alert("لا يمكن حذف حساب عليه حركات!");
                if (accounts.some(a => a.parentId === id)) return alert("لا يمكن حذف حساب رئيسي!");
                if (confirm("هل أنت متأكد؟")) await window.fs.deleteDoc(window.fs.doc(window.db, "accounts", id));
            };

            if (!isLoaded) return <div className="h-screen flex items-center justify-center">جاري التحميل...</div>;
            if (!user) return (
                <div className="h-screen flex items-center justify-center bg-slate-100 p-4 text-center">
                    <div className="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full">
                        <h1 className="text-2xl font-bold mb-6">نظام زياد العتيبي المحاسبي</h1>
                        <form className="space-y-4" onSubmit={(e) => {
                            e.preventDefault();
                            const email = e.target.email.value.includes('@') ? e.target.email.value : `${e.target.email.value}@acca.app`;
                            window.authActions.signInWithEmailAndPassword(window.auth, email, e.target.password.value).catch(() => alert('بيانات خاطئة'));
                        }}>
                            <input name="email" placeholder="اسم المستخدم" className="w-full border p-3 rounded-lg text-right" required />
                            <input name="password" type="password" placeholder="كلمة المرور" className="w-full border p-3 rounded-lg text-right" required />
                            <button className="w-full bg-blue-600 text-white p-3 rounded-lg font-bold">دخول</button>
                        </form>
                    </div>
                </div>
            );

            return (
                <div className="flex h-screen bg-slate-50" dir="rtl">
                    <aside className="w-64 bg-slate-900 text-slate-300 flex flex-col no-print">
                        <div className="p-6 text-white text-xl font-bold border-b border-slate-800">المحاسب الذكي</div>
                        <nav className="p-4 space-y-2">
                            <button onClick={()=>setActiveTab('dashboard')} className={`w-full flex items-center gap-3 p-3 rounded-lg ${activeTab==='dashboard'?'sidebar-active':''}`}><Icon name="home"/> الرئيسية</button>
                            <button onClick={()=>setActiveTab('coa')} className={`w-full flex items-center gap-3 p-3 rounded-lg ${activeTab==='coa'?'sidebar-active':''}`}><Icon name="list"/> دليل الحسابات</button>
                            <button onClick={()=>setActiveTab('journal')} className={`w-full flex items-center gap-3 p-3 rounded-lg ${activeTab==='journal'?'sidebar-active':''}`}><Icon name="plus-circle"/> قيود اليومية</button>
                            <button onClick={()=>window.authActions.signOut(window.auth)} className="w-full flex items-center gap-3 p-3 text-red-400 mt-10 hover:bg-red-900/20"><Icon name="log-out"/> خروج</button>
                        </nav>
                    </aside>

                    <main className="flex-1 p-8 overflow-auto">
                        {activeTab === 'dashboard' && (
                            <div className="grid grid-cols-3 gap-6">
                                <div className="bg-white p-6 rounded-xl border shadow-sm"><h3>إجمالي الأصول</h3><p className="text-3xl font-bold">{accounts.filter(a=>a.type==='asset').reduce((s,a)=>s+getBalance(a.id),0).toLocaleString()}</p></div>
                                <div className="bg-white p-6 rounded-xl border shadow-sm"><h3>إجمالي الخصوم</h3><p className="text-3xl font-bold">{accounts.filter(a=>a.type==='liability').reduce((s,a)=>s+getBalance(a.id),0).toLocaleString()}</p></div>
                                <div className="bg-white p-6 rounded-xl border shadow-sm"><h3>صافي الربح</h3><p className="text-3xl font-bold text-emerald-600">{(accounts.filter(a=>a.type==='revenue').reduce((s,a)=>s+getBalance(a.id),0) - accounts.filter(a=>a.type==='expense').reduce((s,a)=>s+getBalance(a.id),0)).toLocaleString()}</p></div>
                            </div>
                        )}

                        {activeTab === 'coa' && (
                            <div className="space-y-6">
                                <div className="bg-white p-6 rounded-xl border shadow-sm">
                                    <h4 className="font-bold mb-4">{isEditingCoa ? 'تعديل حساب' : 'إضافة حساب جديد'}</h4>
                                    <div className="flex gap-4">
                                        <input placeholder="اسم الحساب" className="border p-2 rounded flex-1" value={coaForm.name} onChange={e=>setCoaForm({...coaForm, name:e.target.value})} />
                                        <select className="border p-2 rounded" value={coaForm.parentId} onChange={e=>{
                                            const p = accounts.find(a=>a.id===e.target.value);
                                            setCoaForm({...coaForm, parentId: e.target.value, code: generateNextCode(p), type: p?p.type:'asset'});
                                        }}>
                                            <option value="">-- حساب رئيسي --</option>
                                            {accounts.filter(a=>a.level < 3).map(a=><option key={a.id} value={a.id}>{a.code} - {a.name}</option>)}
                                        </select>
                                        <button onClick={handleSaveAccount} className="bg-blue-600 text-white px-6 rounded font-bold">حفظ</button>
                                    </div>
                                </div>
                                <div className="bg-white rounded-xl shadow-sm border overflow-hidden">
                                    <table className="w-full text-right">
                                        <thead className="bg-slate-50 border-b">
                                            <tr><th className="p-4">الكود</th><th className="p-4">الحساب</th><th className="p-4">النوع</th><th className="p-4 text-center">الرصيد</th><th className="p-4 text-center">إجراءات</th></tr>
                                        </thead>
                                        <tbody>
                                            {accounts.sort((a,b)=>a.code.localeCompare(b.code, undefined, {numeric: true})).map(acc=>(
                                                <tr key={acc.id} className="border-b hover:bg-slate-50">
                                                    <td className="p-4 font-mono text-slate-500">{acc.code}</td>
                                                    <td className="p-4 font-bold" style={{paddingRight: `${(acc.level-1)*20 + 16}px`}}>{acc.level>1?'↳ ':''}{acc.name}</td>
                                                    <td className="p-4 text-sm text-slate-500">{acc.type}</td>
                                                    <td className="p-4 text-center font-bold text-blue-700">{getBalance(acc.id).toLocaleString()}</td>
                                                    <td className="p-4 text-center">
                                                        <button onClick={()=>deleteAccount(acc.id)} className="text-red-400 hover:text-red-600"><Icon name="trash-2"/></button>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}
                        
                        {activeTab === 'journal' && (
                            <div className="bg-white p-10 rounded-xl border text-center">
                                <Icon name="plus-circle" className="mx-auto w-12 h-12 text-blue-500 mb-4"/>
                                <p>هذا القسم جاهز لاستقبال قيود اليومية من المتدرب.</p>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
