<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>النظام المحاسبي - زياد العتيبي</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #f8fafc; margin: 0; }
        .sidebar-item:hover { background-color: #1e293b; color: white; }
        .active-tab { background-color: #2563eb !important; color: white !important; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDUcQyht2D6vpuUZyCQTxEqtLZf4Feo5aM",
            authDomain: "acca-app-80ca8.firebaseapp.com",
            projectId: "acca-app-80ca8",
            storageBucket: "acca-app-80ca8.firebasestorage.app",
            messagingSenderId: "196121768353",
            appId: "1:196121768353:web:e0623f775bb3f0409e1be0"
        };

        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
        window.auth = getAuth(app);
        window.fs = { collection, onSnapshot, doc, setDoc, addDoc };
        window.authActions = { signInWithEmailAndPassword, signOut, onAuthStateChanged };
        
        window.dispatchEvent(new Event('firebase-ready'));
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // مكون الأيقونات
        const Icon = ({ name, className = "" }) => {
            useEffect(() => { if (window.lucide) lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={`w-5 h-5 ${className}`}></i>;
        };

        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [accounts, setAccounts] = useState([]);
            const [journalEntries, setJournalEntries] = useState([]);

            // تفعيل النظام بعد جاهزية Firebase
            useEffect(() => {
                const startApp = () => {
                    window.authActions.onAuthStateChanged(window.auth, (currentUser) => {
                        setUser(currentUser);
                        setLoading(false);
                    });
                };
                if (window.authActions) startApp();
                else window.addEventListener('firebase-ready', startApp);
            }, []);

            // جلب البيانات من Firebase
            useEffect(() => {
                if (!user) return;
                const unsubAcc = window.fs.onSnapshot(window.fs.collection(window.db, "accounts"), (s) => 
                    setAccounts(s.docs.map(d => ({...d.data(), id: d.id}))));
                const unsubJournals = window.fs.onSnapshot(window.fs.collection(window.db, "journalEntries"), (s) => 
                    setJournalEntries(s.docs.map(d => ({...d.data(), id: d.id}))));
                return () => { unsubAcc(); unsubJournals(); };
            }, [user]);

            // حساب الأرصدة (دالتك الأصلية)
            const getBalance = (id) => {
                let bal = 0;
                const acc = accounts.find(a => a.id === id);
                if (!acc) return 0;
                journalEntries.forEach(e => e.lines?.forEach(l => {
                    if (l.accountId === id) {
                        if (['asset', 'expense'].includes(acc.type)) bal += (Number(l.debit) - Number(l.credit));
                        else bal += (Number(l.credit) - Number(l.debit));
                    }
                }));
                return bal;
            };

            if (loading) return (
                <div className="h-screen flex items-center justify-center bg-slate-50">
                    <div className="text-center">
                        <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto mb-4"></div>
                        <h2 className="text-xl font-bold text-slate-700">جاري تشغيل نظام المحاسبة...</h2>
                    </div>
                </div>
            );

            if (!user) return (
                <div className="h-screen flex items-center justify-center bg-slate-100 p-4">
                    <div className="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full text-center">
                        <h1 className="text-2xl font-bold mb-6">تسجيل الدخول للنظام</h1>
                        <form className="space-y-4" onSubmit={(e) => {
                            e.preventDefault();
                            const email = e.target.email.value.includes('@') ? e.target.email.value : `${e.target.email.value}@acca.app`;
                            window.authActions.signInWithEmailAndPassword(window.auth, email, e.target.password.value)
                                .catch(() => alert('بيانات الدخول غير صحيحة!'));
                        }}>
                            <input name="email" type="text" placeholder="اسم المستخدم" className="w-full border p-3 rounded-lg text-right" required />
                            <input name="password" type="password" placeholder="كلمة المرور" className="w-full border p-3 rounded-lg text-right" required />
                            <button className="w-full bg-blue-600 text-white p-3 rounded-lg font-bold">دخول</button>
                        </form>
                    </div>
                </div>
            );

            return (
                <div className="flex h-screen bg-slate-50" dir="rtl">
                    {/* القائمة الجانبية الكاملة */}
                    <aside className="w-64 bg-slate-900 text-slate-300 flex flex-col no-print">
                        <div className="p-6 text-white text-xl font-bold border-b border-slate-800">نظام زياد العتيبي</div>
                        <nav className="flex-1 p-4 space-y-2">
                            <button onClick={() => setActiveTab('dashboard')} className={`w-full flex items-center gap-3 p-3 rounded-lg transition-all ${activeTab === 'dashboard' ? 'active-tab' : 'sidebar-item'}`}><Icon name="home"/> الرئيسية</button>
                            <button onClick={() => setActiveTab('coa')} className={`w-full flex items-center gap-3 p-3 rounded-lg transition-all ${activeTab === 'coa' ? 'active-tab' : 'sidebar-item'}`}><Icon name="list"/> دليل الحسابات</button>
                            <button onClick={() => setActiveTab('journal')} className={`w-full flex items-center gap-3 p-3 rounded-lg transition-all ${activeTab === 'journal' ? 'active-tab' : 'sidebar-item'}`}><Icon name="plus-circle"/> قيود اليومية</button>
                            <button onClick={() => setActiveTab('reports')} className={`w-full flex items-center gap-3 p-3 rounded-lg transition-all ${activeTab === 'reports' ? 'active-tab' : 'sidebar-item'}`}><Icon name="pie-chart"/> القوائم المالية</button>
                            <button onClick={() => window.authActions.signOut(window.auth)} className="w-full flex items-center gap-3 p-3 rounded-lg text-red-400 hover:bg-red-900/20 mt-10"><Icon name="log-out"/> تسجيل الخروج</button>
                        </nav>
                    </aside>

                    {/* المحتوى الرئيسي */}
                    <main className="flex-1 overflow-auto p-8">
                        <header className="flex justify-between items-center mb-8 border-b pb-4">
                            <h2 className="text-2xl font-bold text-slate-800">
                                {activeTab === 'dashboard' && 'نظرة عامة'}
                                {activeTab === 'coa' && 'دليل الحسابات'}
                                {activeTab === 'journal' && 'إدخال قيود اليومية'}
                                {activeTab === 'reports' && 'التقارير المالية'}
                            </h2>
                            <div className="bg-blue-50 text-blue-700 px-4 py-1 rounded-full font-bold">متصل: {user.email.split('@')[0]}</div>
                        </header>

                        {activeTab === 'dashboard' && (
                            <div className="grid grid-cols-3 gap-6">
                                <div className="bg-white p-6 rounded-xl border shadow-sm text-center">
                                    <h3 className="text-slate-500 mb-2">إجمالي الأصول</h3>
                                    <p className="text-3xl font-bold">{accounts.filter(a=>a.type==='asset').reduce((s,a)=>s+getBalance(a.id),0).toLocaleString()}</p>
                                </div>
                                <div className="bg-white p-6 rounded-xl border shadow-sm text-center">
                                    <h3 className="text-slate-500 mb-2">إجمالي الخصوم</h3>
                                    <p className="text-3xl font-bold">{accounts.filter(a=>a.type==='liability').reduce((s,a)=>s+getBalance(a.id),0).toLocaleString()}</p>
                                </div>
                                <div className="bg-white p-6 rounded-xl border shadow-sm text-center">
                                    <h3 className="text-slate-500 mb-2">صافي الربح</h3>
                                    <p className="text-3xl font-bold text-emerald-600">{(accounts.filter(a=>a.type==='revenue').reduce((s,a)=>s+getBalance(a.id),0) - accounts.filter(a=>a.type==='expense').reduce((s,a)=>s+getBalance(a.id),0)).toLocaleString()}</p>
                                </div>
                            </div>
                        )}

                        {activeTab === 'coa' && (
                            <div className="bg-white rounded-xl shadow-sm border overflow-hidden">
                                <table className="w-full text-right">
                                    <thead className="bg-slate-50 border-b">
                                        <tr><th className="p-4">الكود</th><th className="p-4">اسم الحساب</th><th className="p-4">النوع</th><th className="p-4">الرصيد الحالي</th></tr>
                                    </thead>
                                    <tbody>
                                        {accounts.sort((a,b)=>a.code-b.code).map(acc=>(
                                            <tr key={acc.id} className="border-b hover:bg-slate-50">
                                                <td className="p-4">{acc.code}</td><td className="p-4 font-bold">{acc.name}</td>
                                                <td className="p-4">{acc.type}</td><td className="p-4 font-bold text-blue-600">{getBalance(acc.id).toLocaleString()}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}

                        {activeTab === 'journal' && (
                            <div className="bg-white p-10 rounded-xl border text-center shadow-sm">
                                <Icon name="plus-circle" className="mx-auto text-blue-500 mb-4 w-12 h-12"/>
                                <h3 className="text-xl font-bold mb-2">إضافة قيد محاسبي</h3>
                                <p className="text-slate-500 mb-6">بإمكان المتدرب الآن إدخال البيانات مباشرة من هذا القسم.</p>
                                <button className="bg-blue-600 text-white px-8 py-2 rounded-lg font-bold">بدء الإدخال</button>
                            </div>
                        )}

                        {activeTab === 'reports' && (
                            <div className="bg-white p-10 rounded-xl border text-center shadow-sm">
                                <Icon name="file-text" className="mx-auto text-emerald-500 mb-4 w-12 h-12"/>
                                <h3 className="text-xl font-bold">التقارير المالية</h3>
                                <p className="mt-4 text-slate-500">جاري استخراج البيانات من دفتر الأستاذ العام...</p>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
